blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >
    ### Version 1.3.1
    **Autor: D.B.**
    Umfassende Logik zur Steuerung des Anwesenheitsstatus.
  domain: automation
  input:
    activity_sensors:
      name: "Aktivitäts-Sensoren / Activity Sensors"
      description: "Sensoren für Anwesenheit."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände / States"
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Status Helfer / Status Helper"
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master: Anwesenheit"
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit"
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit / Delay"
      default:
        minutes: 1
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn"
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende"
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Counter Helfer"
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert"
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Counter Reset"
      default: 5
      selector:
        number:
          min: 1
          max: 60
    absence_actions:
      name: "Aktionen Abwesenheit"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit"
      default: []
      selector:
        action: {}

mode: restart

variables:
  sensors: !input activity_sensors
  states_list: !input activity_states
  delay_config: !input absence_delay
  s_start: !input absence_forbidden_start
  s_end: !input absence_forbidden_end

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # GEHEN (ABWESEND)
      - conditions:
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: >
              {# Prüfe ob irgendein Sensor AKTIV ist #}
              {% set any_active = expand(sensors) | selectattr('state', 'in', states_list) | list | count > 0 %}
              
              {# Zeitberechnung: Wann war die letzte Aktivität? #}
              {% set last_act = expand(sensors) | map(attribute='last_changed') | max %}
              {% set diff = (now() - last_act).total_seconds() | int %}
              {% set wait = (delay_config.hours * 3600) + (delay_config.minutes * 60) + (delay_config.seconds) %}
              
              {# Nachtsperre Logik #}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if s_start < s_end %}
                {% set locked = s_start <= cur <= s_end %}
              {% else %}
                {% set locked = cur >= s_start or cur <= s_end %}
              {% endif %}
              
              {# NUR wenn inaktiv UND Zeit abgelaufen UND nicht gesperrt #}
              {{ not any_active and diff >= wait and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # KOMMEN (ANWESEND)
      - conditions:
          - condition: state
            entity_id: !input master_switch_presence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: template
            value_template: >
              {{ expand(sensors) | selectattr('state', 'in', states_list) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(!input presence_counter) | int >= (!input counter_threshold | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - choose: []
                default: !input presence_actions
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
