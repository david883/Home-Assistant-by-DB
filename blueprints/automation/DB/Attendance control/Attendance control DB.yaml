blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: "Version 1.2.9 - Stabilisierter Zeitabgleich für Absence Delay"
  domain: automation
  input:
    activity_sensors:
      name: "Sensoren"
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Aktiv-Zustände"
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Anwesenheits-Status"
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit"
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit Abwesenheit"
      default:
        minutes: 1
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn"
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende"
      default: "08:00:00"
      selector:
        time: {}
    # ... (restliche Inputs gekürzt für Übersicht)
    presence_counter:
      name: "Counter"
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert"
      default: 2
      selector:
        number:
          min: 1
          max: 10
    master_switch_presence:
      name: "Master: Anwesenheit"
      selector:
        entity:
          filter:
            domain: input_boolean
    counter_reset_timeout:
      name: "Counter Reset"
      default: 5
      selector:
        number:
          min: 1
          max: 60
    absence_actions:
      name: "Aktionen Abwesenheit"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit"
      default: []
      selector:
        action: {}

mode: restart

variables:
  sensors: !input activity_sensors
  states_list: !input activity_states
  delay_config: !input absence_delay
  s_start: !input absence_forbidden_start
  s_end: !input absence_forbidden_end

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1" # Prüft jede Minute aktiv nach, falls der Trigger mal "schläft"

action:
  - choose:
      - conditions:
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: >
              {% set inactive = expand(sensors) | selectattr('state', 'in', states_list) | list | count == 0 %}
              {% set last_ch = expand(sensors) | map(attribute='last_changed') | max %}
              {% set wait = (delay_config.hours * 3600) + (delay_config.minutes * 60) + (delay_config.seconds) %}
              {% set locked = false %}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if s_start < s_end %}
                {% set locked = s_start <= cur <= s_end %}
              {% else %}
                {% set locked = cur >= s_start or cur <= s_end %}
              {% endif %}
              {{ inactive and (now() - last_ch).total_seconds() >= wait and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - choose: []
            default: !input absence_actions
