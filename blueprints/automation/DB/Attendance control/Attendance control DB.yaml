blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >
    ### Version 1.3.4
    **Autor: D.B.**
    Fix: Absence Delay nutzt jetzt den echten Zustandswechsel-Zeitstempel.
  domain: automation
  input:
    activity_sensors:
      name: "Sensoren / Sensors"
      description: "Bewegungsmelder oder Kontakte."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustaende / States"
      description: "Status für Aktiv (z.B. on)."
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Status Helfer / Status Helper"
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master Anwesenheit"
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master Abwesenheit"
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit / Delay"
      default:
        minutes: 1
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn"
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende"
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Counter Helfer"
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert"
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Counter Reset"
      default: 5
      selector:
        number:
          min: 1
          max: 60
    absence_actions:
      name: "Aktionen Abwesenheit"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit"
      default: []
      selector:
        action: {}

mode: restart

variables:
  var_sensors: !input activity_sensors
  var_states: !input activity_states
  var_delay: !input absence_delay
  var_s_start: !input absence_forbidden_start
  var_s_end: !input absence_forbidden_end
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- FALL: ABWESEND WERDEN ---
      - conditions:
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: >
              {# Sind alle Sensoren im Leerlauf? #}
              {% set active_now = expand(var_sensors) | selectattr('state', 'in', var_states) | list | count > 0 %}
              
              {# Wann war der letzte ECHTE Zustandswechsel zu einem Inaktiv-Wert? #}
              {% set last_change = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set seconds_since_change = (now() - last_change).total_seconds() | int %}
              
              {# Wartezeit aus Input berechnen #}
              {% set wait_seconds = (var_delay.hours * 3600) + (var_delay.minutes * 60) + (var_delay.seconds) %}
              
              {# Nachtsperre prüfen #}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if var_s_start < var_s_end %}
                {% set in_lock = var_s_start <= cur <= var_s_end %}
              {% else %}
                {% set in_lock = cur >= var_s_start or cur <= var_s_end %}
              {% endif %}
              
              {{ not active_now and seconds_since_change >= wait_seconds and not in_lock }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- FALL: ANWESEND WERDEN ---
      - conditions:
          - condition: state
            entity_id: !input master_switch_presence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(var_counter) | int >= (var_threshold | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - choose: []
                default: !input presence_actions
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
