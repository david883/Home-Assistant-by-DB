blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >
    ### Version 1.4.2
    **Autor: D.B.**

    DE: Umfassende Logik mit Inaktiv-Zuständen, Counter-Reset und Nachtsperre über Helfer.
    
    EN: Comprehensive logic with inactive states, counter reset and night lock via helpers.
  domain: automation
  input:
    activity_sensors:
      name: "Sensoren / Sensors"
      description: "DE: Sensoren für Anwesenheit.\n\nEN: Sensors for presence."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände Aktiv / Active States"
      description: "DE: Zustände für ANWESEND (z.B. on).\n\nEN: States for PRESENT (e.g. on)."
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    inactive_states:
      name: "Zustände Inaktiv / Inactive States"
      description: "DE: Zustände für ABWESEND (z.B. off).\n\nEN: States for ABSENT (e.g. off)."
      default: ["off", "closed", "unavailable"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["off", "closed", "unavailable", "not_home"]
    presence_boolean:
      name: "Anwesenheits Status / Presence Status"
      description: "DE: Der zentrale Status-Schalter.\n\nEN: The central status switch."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master: Anwesenheit / Master: Presence"
      description: "DE: Erlaubt Automatik für Kommen.\n\nEN: Allows auto-arriving."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit / Master: Absence"
      description: "DE: Erlaubt Automatik für Gehen.\n\nEN: Allows auto-leaving."
      selector:
        entity:
          filter:
            domain: input_boolean
    manual_absence_switch:
      name: "Sofort-Abwesend Schalter / Instant Absence Switch"
      description: "DE: Schaltet bei Aktivierung (ggf. verzögert) auf abwesend.\n\nEN: Triggers absence (optional delay) when activated."
      selector:
        entity:
          filter:
            domain: input_boolean
    manual_absence_delay:
      name: "Verzögerung für Sofort-Schalter / Delay for Instant Switch"
      description: "DE: Zeit, die nach Drücken des Sofort-Schalters gewartet wird.\n\nEN: Delay after pressing the instant switch."
      default:
        seconds: 0
      selector:
        duration: {}
    absence_delay:
      name: "Wartezeit Abwesenheit / Absence Delay"
      description: "DE: Normale Verzögerung für die Automatik.\n\nEN: Standard delay for automation."
      default:
        minutes: 1
      selector:
        duration: {}
    night_lock_start_helper:
      name: "Nachtsperre beginnt um / Night lock starts at"
      description: "DE: Helfer für den Start der Sperre.\n\nEN: Helper for lock start."
      selector:
        entity:
          filter:
            domain: input_datetime
    night_lock_end_helper:
      name: "Nachtsperre endet um / Night lock ends at"
      description: "DE: Helfer für das Ende der Sperre.\n\nEN: Helper for lock end."
      selector:
        entity:
          filter:
            domain: input_datetime
    presence_counter:
      name: "Aktivitäts Counter / Activity Counter"
      description: "DE: Counter-Helfer auswählen.\n\nEN: Select counter helper."
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert / Threshold"
      description: "DE: Impulse für Anwesenheit.\n\nEN: Triggers for presence."
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Zeitfenster für Impulse / Counter Reset Timeout"
      description: "DE: Innerhalb wie vieler Minuten müssen die Impulse erfolgen?\n\nEN: Triggers must occur within this many minutes."
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: "min"
    absence_actions:
      name: "Aktionen Abwesenheit / Absence Actions"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit / Presence Actions"
      default: []
      selector:
        action: {}

mode: restart

variables:
  var_sensors: !input activity_sensors
  var_states_active: !input activity_states
  var_delay: !input absence_delay
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold
  var_reset_time: !input counter_reset_timeout
  var_lock_start_ent: !input night_lock_start_helper
  var_lock_end_ent: !input night_lock_end_helper

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: state
    entity_id: !input manual_absence_switch
    to: "on"
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- FALL 1: SOFORT ABWESEND ---
      - conditions:
          - condition: state
            entity_id: !input manual_absence_switch
            state: "on"
        sequence:
          - delay: !input manual_absence_delay
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: input_boolean.turn_off
            target:
              entity_id: !input manual_absence_switch
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- FALL 2: AUTOMATISCH ABWESEND ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: template
            value_template: >
              {% set active_count = expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count %}
              {% set last_changed = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set h = var_delay.hours | default(0) | int %}
              {% set m = var_delay.minutes | default(0) | int %}
              {% set s = var_delay.seconds | default(0) | int %}
              {% set wait_sec = (h * 3600) + (m * 60) + s %}
              {% set time_ok = (as_timestamp(now()) - as_timestamp(last_changed)) >= (wait_sec - 2) %}

              {% set start_time = states(var_lock_start_ent) %}
              {% set end_time = states(var_lock_end_ent) %}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if start_time < end_time %}
                {% set locked = start_time <= cur <= end_time %}
              {% else %}
                {% set locked = cur >= start_time or cur <= end_time %}
              {% endif %}

              {{ active_count == 0 and time_ok and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- FALL 3: ANWESEND WERDEN (Mit Counter & Timeout) ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: state
            entity_id: !input master_switch_presence
            state: "on"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(var_counter) | int >= (var_threshold | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
              - choose: []
                default: !input presence_actions
            else:
              # Warte auf weiteren Impuls oder Timeout
              - wait_for_trigger:
                  - platform: state
                    entity_id: !input activity_sensors
                timeout:
                  minutes: !input counter_reset_timeout
                continue_on_timeout: true
              - if:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                then:
                  - action: counter.reset
                    target:
                      entity_id: !input presence_counter
