blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >-
    ## 🛠 Installation & Support

    ### PayPal Spende - Donation
    Wenn dir dieser Blueprint gefällt, freue ich mich über eine kleine Unterstützung für die Kaffeekasse:
    
    [![PayPal Spende](https://www.paypalobjects.com/de_DE/DE/i/btn/btn_donateCC_LG.gif)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)
    
    ---
    
    ### Version 14.04.2026-1
    **Autor: D.B.**

    DE: Optimierte Nachtsperre durch Minuten-Vergleich (robuster gegen Formatfehler) und Source-URL.
    
    EN: Optimized night lock using minute comparison (robust against format errors) and source URL.
  domain: automation
  source_url: https://github.com/david883/Home-Assistant-by-DB/blob/beta/blueprints%2Fautomation%2FDB%2FAttendance%20control%2FAttendance%20control%20DB.yaml
  input:
    activity_sensors:
      name: "Sensoren - Sensors"
      description: "DE: Sensoren für Anwesenheit.\n\nEN: Presence sensors."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände Aktiv - Active States"
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Anwesenheits Status - Presence Status"
      selector:
        entity:
          filter:
            domain: input_boolean
    master_presence_enabled:
      name: "Master: Anwesenheit aktivieren - Master: Presence enabled"
      default: true
      selector:
        boolean: {}
    master_absence_enabled:
      name: "Master: Abwesenheit aktivieren - Master: Absence enabled"
      default: true
      selector:
        boolean: {}
    absence_delay:
      name: "Wartezeit Abwesenheit - Absence Delay"
      default:
        minutes: 1
      selector:
        duration: {}
    night_lock_start:
      name: "Nachtsperre beginnt um - Night lock starts at"
      default: "22:00:00"
      selector:
        time: {}
    night_lock_end:
      name: "Nachtsperre endet um - Night lock ends at"
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Aktivitäts Counter - Activity Counter"
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert - Threshold"
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Zeitfenster für Impulse - Counter Reset Timeout"
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: "min"
    absence_actions:
      name: "Aktionen Abwesenheit - Absence Actions"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit - Presence Actions"
      default: []
      selector:
        action: {}

mode: parallel
max: 10

variables:
  var_sensors: !input activity_sensors
  var_states_active: !input activity_states
  var_delay: !input absence_delay
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold
  var_lock_start: !input night_lock_start
  var_lock_end: !input night_lock_end
  var_master_presence: !input master_presence_enabled
  var_master_absence: !input master_absence_enabled
  var_reset_min: !input counter_reset_timeout
  var_presence_boolean: !input presence_boolean

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- FALL 1: AUTOMATISCH ABWESEND ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: "{{ var_master_absence }}"
          - condition: template
            value_template: >
              {# Sensoren inaktiv? #}
              {% set active = expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count == 0 %}
              
              {# Zeit seit letzter Änderung berechnen #}
              {% set last_ch = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set h = var_delay.hours | default(0) | int %}
              {% set m = var_delay.minutes | default(0) | int %}
              {% set s = var_delay.seconds | default(0) | int %}
              {% set wait = (h * 3600) + (m * 60) + s %}
              {% set time_ok = (as_timestamp(now()) - as_timestamp(last_ch)) >= (wait - 1) %}
              
              {# Nachtsperre Logik (Minuten seit Mitternacht) #}
              {% set now_min = now().hour * 60 + now().minute %}
              {% set start_parts = var_lock_start.split(':') %}
              {% set start_min = start_parts[0]|int * 60 + start_parts[1]|int %}
              {% set end_parts = var_lock_end.split(':') %}
              {% set end_min = end_parts[0]|int * 60 + end_parts[1]|int %}
              
              {% if start_min < end_min %}
                {% set locked = start_min <= now_min < end_min %}
              {% else %}
                {% set locked = now_min >= start_min or now_min < end_min %}
              {% endif %}
              
              {{ active and time_ok and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - delay: "00:00:01"
          - choose: []
            default: !input absence_actions

      # --- FALL 2: ANWESEND WERDEN / COUNTER LOGIK ---
      - conditions:
          - condition: template
            value_template: "{{ var_master_presence }}"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count > 0 or states(var_counter)|int > 0 }}
        sequence:
          - if:
              - condition: template
                value_template: >
                  {% set last_ch = expand(var_sensors) | map(attribute='last_changed') | max %}
                  {% set diff = (as_timestamp(now()) - as_timestamp(last_ch)) / 60 %}
                  {{ diff > var_reset_min and states(var_counter)|int > 0 }}
            then:
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
            else:
              - if:
                  - condition: template
                    value_template: >
                      {{ trigger.entity_id in var_sensors and states(trigger.entity_id) in var_states_active 
                         and states(var_presence_boolean) == 'off' }}
                then:
                  - action: counter.increment
                    target:
                      entity_id: !input presence_counter
              
              - if:
                  - condition: template
                    value_template: "{{ states(var_counter) | int >= (var_threshold | int) and states(var_presence_boolean) == 'off' }}"
                then:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: !input presence_boolean
                  - action: counter.reset
                    target:
                      entity_id: !input presence_counter
                  - delay: "00:00:01"
                  - choose: []
                    default: !input presence_actions
