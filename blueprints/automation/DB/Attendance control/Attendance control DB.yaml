blueprint:
  name: "Präsenzmanagement (BWM/Counter/Auto-Reset)"
  description: "Kombiniert Bewegungserkennung, Counter-Logik mit Auto-Reset und Abwesenheits-Check."
  domain: automation
  input:
    motion_sensors:
      name: Bewegungsmelder
      description: Alle Sensoren, die bei Bewegung den Counter triggern sollen.
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    all_motion_group:
      name: Gruppe aller Bewegungsmelder
      description: Ein binary_sensor (z.B. Gruppe), der OFF geht, wenn nirgends mehr Bewegung ist.
      selector:
        entity:
          domain: binary_sensor
    presence_boolean:
      name: Anwesenheit Status Helper
      selector:
        entity:
          domain: input_boolean
    presence_counter:
      name: Anwesenheit Counter
      selector:
        entity:
          domain: counter
    input_select_on:
      name: Input Select (Wer hat aktiviert)
      selector:
        entity:
          domain: input_select
    input_select_off:
      name: Input Select (Wer hat deaktiviert)
      selector:
        entity:
          domain: input_select
    notification_text:
      name: Benachrichtigungs-Text Helper
      selector:
        entity:
          domain: input_text
    person_entities:
      name: Personen
      description: Personen, die "not_home" sein müssen für den Abwesenheits-Check.
      selector:
        entity:
          domain: person
          multiple: true

mode: restart # Wichtig für die Reset-Logik (ersetzt Automatik 2)

triggers:
  # Trigger 1: Bewegung erkannt
  - trigger: state
    entity_id: !input motion_sensors
    to: "on"
    id: bewegung_erkannt
  # Trigger 2: Lange keine Bewegung (Abwesenheit)
  - trigger: state
    entity_id: !input all_motion_group
    from: "on"
    to: "off"
    for:
      hours: 2
    id: abwesenheit_check
  # Trigger 3: Counter hat sich geändert (für Reset-Logik)
  - trigger: state
    entity_id: !input presence_counter
    id: counter_changed

actions:
  - choose:
      # FALL 1: Bewegung erkannt -> Hochzählen & Anwesenheit setzen
      - conditions:
          - condition: trigger
            id: bewegung_erkannt
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
        sequence:
          - if:
              - condition: state
                entity_id: !input presence_boolean
                state: "off"
                for: "00:05:00"
            then:
              - action: counter.increment
                target:
                  entity_id: !input presence_counter
          - if:
              - condition: numeric_state
                entity_id: !input presence_counter
                above: 2
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - action: input_select.select_option
                target:
                  entity_id: !input input_select_on
                data:
                  option: BWM
              - action: input_text.set_value
                target:
                  entity_id: !input notification_text
                data:
                  value: "Alexa: Hallo, schön das du da bist "
              - action: counter.reset
                target:
                  entity_id: !input presence_counter

      # FALL 2: Lange keine Bewegung -> Abwesenheit prüfen
      - conditions:
          - condition: trigger
            id: abwesenheit_check
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: time
            after: "09:00:00"
            before: "22:00:00"
        sequence:
          # Prüfung ob alle Personen weg sind (dynamisch)
          - condition: template
            value_template: >
              {% set persons = state_attr(this.entity_id, 'person_entities') or [] %}
              {{ expand(persons) | selectattr('state', 'ne', 'not_home') | list | count == 0 }}
          - action: input_select.select_option
            target:
              entity_id: !input input_select_off
            data:
              option: BWM
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - action: input_text.set_value
            target:
              entity_id: !input notification_text
            data:
              value: "Alexa: Tschüss bis bald."

      # FALL 3: Counter Reset (Die Logik aus deiner 2. Automatik)
      - conditions:
          - condition: trigger
            id: counter_changed
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: numeric_state
            entity_id: !input presence_counter
            above: 0
        sequence:
          - delay: "00:03:00"
          - if:
              - condition: state
                entity_id: !input presence_boolean
                state: "off"
            then:
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
