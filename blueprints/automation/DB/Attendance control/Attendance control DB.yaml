blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >-
    ## 🛠 Installation & Support

    ### PayPal Spende - Donation
    Wenn dir dieser Blueprint gefällt, freue ich mich über eine kleine Unterstützung für die Kaffeekasse:
    
    [![PayPal Spende](https://www.paypalobjects.com/de_DE/DE/i/btn/btn_donateCC_LG.gif)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)
    
    ### Import
    Klicke auf den Button, um den Blueprint direkt in deine Home Assistant Instanz zu importieren oder zu aktualisieren:
    
    [![Blueprint Import](https://my.home-assistant.io/badges/blueprint_import.svg)](https://my.home-assistant.io/redirect/blueprint_import/?blueprint_url=https%3A%2F%2Fgithub.com%2Fdavid883%2FHome-Assistant-by-DB%2Fblob%2Fmain%2Fblueprints%2Fautomation%2FDB%2FAttendance%2520control%2FAttendance%2520control%2520DB.yaml)
    
    ---
    
    ### Version 05.04.2026-2
    **Autor: D.B.**

    DE: Umfassende Logik zur Steuerung des Anwesenheitsstatus mit Aktivitätsprüfung, Nachtsperre über Helfer und manuellem Sofort-Aus.
    
    EN: Comprehensive presence control logic with activity check, night lock via helpers, and manual instant-off.
  domain: automation
  input:
    activity_sensors:
      name: "Sensoren - Sensors"
      description: >-
        DE: Sensoren, die Anwesenheit anzeigen (BWM, Kontakte).
        
        EN: Sensors indicating presence (Motion, Contacts).
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände Aktiv - Active States"
      description: >-
        DE: Zustände, die als AKTIV gelten (z.B. on, motion, home).
        
        EN: States considered ACTIVE (e.g. on, motion, home).
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    inactive_states:
      name: "Zustände Inaktiv - Inactive States"
      description: >-
        DE: Zustände, die als INAKTIV gelten (z.B. off, closed).
        
        EN: States considered INACTIVE (e.g. off, closed).
      default: ["off", "closed", "unavailable"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["off", "closed", "unavailable", "not_home"]
    presence_boolean:
      name: "Anwesenheits Status - Presence Status"
      description: >-
        DE: Der zentrale Helfer-Schalter (Input Boolean) für den aktuellen Status.
        
        EN: The central helper switch (input boolean) for the current status.
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master: Anwesenheit - Master: Presence"
      description: >-
        DE: Erlaubt das automatische Setzen auf 'Anwesend' bei Sensor-Aktivität.
        
        EN: Allows automatic setting to 'Present' upon sensor activity.
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit - Master: Absence"
      description: >-
        DE: Erlaubt das automatische Setzen auf 'Abwesend' nach Ablauf der Wartezeit.
        
        EN: Allows automatic setting to 'Absent' after the delay expires.
      selector:
        entity:
          filter:
            domain: input_boolean
    manual_absence_triggers:
      name: "Sofort-Abwesend Auslöser - Instant Absence Triggers"
      description: >-
        DE: Liste von Objekten (Taster, Schalter, Buttons), die sofort reagieren.
        
        EN: List of entities (buttons, switches) that react immediately.
      selector:
        entity:
          multiple: true
    manual_absence_states:
      name: "Zustände für Sofort-Aus - States for Instant Absence"
      description: >-
        DE: Zustände der Auslöser, die eine Aktion bewirken (z.B. on, pressed).
        
        EN: Trigger states that cause an action (e.g. on, pressed).
      default: ["on"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "off", "pressed", "active"]
    manual_absence_delay:
      name: "Verzögerung für Sofort-Schalter - Delay for Instant Switch"
      description: >-
        DE: Zeit, die nach dem Auslösen gewartet wird, bevor der Status auf ABWESEND springt.
        
        EN: Time to wait after triggering before the status changes to ABSENT.
      default:
        seconds: 0
      selector:
        duration: {}
    absence_delay:
      name: "Wartezeit Abwesenheit - Absence Delay"
      description: >-
        DE: Zeit ohne Sensor-Aktivität, bis die Automatik auf ABWESEND schaltet.
        
        EN: Time without sensor activity until the automation switches to ABSENT.
      default:
        minutes: 1
      selector:
        duration: {}
    night_lock_start_helper:
      name: "Nachtsperre beginnt um - Night lock starts at"
      description: >-
        DE: Input_datetime Helfer für den Beginn der Sperrzeit (kein automatisches Gehen).
        
        EN: Input_datetime helper for the start of the lock period (no auto-leaving).
      selector:
        entity:
          filter:
            domain: input_datetime
    night_lock_end_helper:
      name: "Nachtsperre endet um - Night lock ends at"
      description: >-
        DE: Input_datetime Helfer für das Ende der Sperrzeit.
        
        EN: Input_datetime helper for the end of the lock period.
      selector:
        entity:
          filter:
            domain: input_datetime
    presence_counter:
      name: "Aktivitäts Counter - Activity Counter"
      description: >-
        DE: Counter-Helfer, der die Sensor-Impulse zählt, bevor auf ANWESEND geschaltet wird.
        
        EN: Counter helper that counts sensor triggers before switching to PRESENT.
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert - Threshold"
      description: >-
        DE: Anzahl der nötigen Sensor-Impulse innerhalb des Zeitfensters.
        
        EN: Number of required sensor triggers within the time window.
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Zeitfenster für Impulse - Counter Reset Timeout"
      description: >-
        DE: Zeitraum in Minuten, in dem die Impulse für den Schwellenwert erfolgen müssen.
        
        EN: Period in minutes within which the triggers for the threshold must occur.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: "min"
    instant_absence_actions:
      name: "Aktionen Sofort-Abwesend - Instant Absence Actions"
      description: >-
        DE: Aktionen, die SOFORT bei Betätigung des Auslösers starten (vor der Verzögerung).
        
        EN: Actions that start IMMEDIATELY upon trigger activation (before the delay).
      default: []
      selector:
        action: {}
    absence_actions:
      name: "Aktionen Abwesenheit - Absence Actions"
      description: >-
        DE: Aktionen, die beim Wechsel in den Status ABWESEND ausgeführt werden.
        
        EN: Actions executed when switching to ABSENT status.
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit - Presence Actions"
      description: >-
        DE: Aktionen, die beim Wechsel in den Status ANWESEND ausgeführt werden.
        
        EN: Actions executed when switching to PRESENT status.
      default: []
      selector:
        action: {}

mode: restart

variables:
  var_sensors: !input activity_sensors
  var_states_active: !input activity_states
  var_delay: !input absence_delay
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold
  var_lock_start_ent: !input night_lock_start_helper
  var_lock_end_ent: !input night_lock_end_helper
  var_manual_ents: !input manual_absence_triggers
  var_manual_states: !input manual_absence_states

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: state
    entity_id: !input manual_absence_triggers
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- FALL 1: SOFORT-AUSLÖSER ---
      - conditions:
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ trigger.entity_id in var_manual_ents }}"
              - condition: template
                value_template: >
                  {% set match = expand(var_manual_ents) | selectattr('state', 'in', var_manual_states) | list | count > 0 %}
                  {% set last = expand(var_manual_ents) | map(attribute='last_updated') | max %}
                  {% set recent = (as_timestamp(now()) - as_timestamp(last)) < 3 %}
                  {{ match or recent }}
        sequence:
          - choose: []
            default: !input instant_absence_actions
          - delay: !input manual_absence_delay
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - repeat:
              for_each: "{{ var_manual_ents }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ states(repeat.item) in var_manual_states }}"
                  then:
                    - action: homeassistant.turn_off
                      target:
                        entity_id: "{{ repeat.item }}"
          - choose: []
            default: !input absence_actions

      # --- FALL 2: AUTOMATISCH ABWESEND ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: template
            value_template: >
              {% set active = expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count == 0 %}
              {% set last_ch = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set h = var_delay.hours | default(0) | int %}
              {% set m = var_delay.minutes | default(0) | int %}
              {% set s = var_delay.seconds | default(0) | int %}
              {% set wait = (h * 3600) + (m * 60) + s %}
              {% set time_ok = (as_timestamp(now()) - as_timestamp(last_ch)) >= (wait - 1) %}
              {% set start = states(var_lock_start_ent) %}
              {% set end = states(var_lock_end_ent) %}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if start < end %}
                {% set locked = start <= cur <= end %}
              {% else %}
                {% set locked = cur >= start or cur <= end %}
              {% endif %}
              {{ active and time_ok and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- FALL 3: ANWESEND WERDEN ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: state
            entity_id: !input master_switch_presence
            state: "on"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(var_counter) | int >= (var_threshold | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
              - choose: []
                default: !input presence_actions
            else:
              - wait_for_trigger:
                  - platform: state
                    entity_id: !input activity_sensors
                timeout:
                  minutes: !input counter_reset_timeout
                continue_on_timeout: true
              - if:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                then:
                  - action: counter.reset
                    target:
                      entity_id: !input presence_counter
