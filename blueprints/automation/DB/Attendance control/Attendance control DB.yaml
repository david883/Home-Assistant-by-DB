blueprint:
  name: "Anwesenheits-Steuerung DB (V 1.2.8)"
  description: >
    ### Version 1.2.8
    - Fix: Nacht-Sperre Logik optimiert (Über Mitternacht)
    - Fix: Zeitberechnung für Absence Delay stabilisiert
  domain: automation
  input:
    activity_sensors:
      name: "Aktivitäts-Sensoren / Activity Sensors"
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Aktivitäts-Zustände / Activity States"
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Anwesenheits-Status / Presence Status"
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit / Master: Absence"
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit Abwesenheit / Absence Delay"
      default:
        minutes: 1
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn / Night Lock Start"
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende / Night Lock End"
      default: "08:00:00"
      selector:
        time: {}
    # ... (restliche Inputs wie zuvor)
    presence_counter:
      name: "Aktivitäts-Counter"
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert"
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Counter Reset Timeout"
      default: 5
      selector:
        number:
          min: 1
          max: 60
    master_switch_presence:
      name: "Master: Anwesenheit"
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_actions:
      name: "Aktionen Abwesenheit"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit"
      default: []
      selector:
        action: {}

mode: restart

variables:
  sensors: !input activity_sensors
  states_list: !input activity_states
  delay_config: !input absence_delay
  # Sperrzeiten als Variablen für das Template
  s_start: !input absence_forbidden_start
  s_end: !input absence_forbidden_end

trigger:
  - platform: state
    entity_id: !input activity_sensors
    id: "potential_absence"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "potential_absence"
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          # TEMPLATE PRÜFUNG: Inaktivität & Nachtsperre
          - condition: template
            value_template: >
              {# 1. Prüfung: Sind alle Sensoren inaktiv? #}
              {% set all_inactive = expand(sensors) | selectattr('state', 'in', states_list) | list | count == 0 %}
              
              {# 2. Prüfung: Ist die Wartezeit abgelaufen? #}
              {% set last_changed = expand(sensors) | map(attribute='last_changed') | max %}
              {% set wait_seconds = (delay_config.hours | int * 3600) + (delay_config.minutes | int * 60) + (delay_config.seconds | int) %}
              {% set duration_met = (now() - last_changed).total_seconds() >= wait_seconds %}
              
              {# 3. Prüfung: Nachtsperre (Logik für über Mitternacht) #}
              {% set current_time = now().strftime('%H:%M:%S') %}
              {% if s_start < s_end %}
                {# Sperre am gleichen Tag (z.B. 10:00 bis 12:00) #}
                {% set in_lock = s_start <= current_time <= s_end %}
              {% else %}
                {# Sperre über Mitternacht (z.B. 22:00 bis 08:00) #}
                {% set in_lock = current_time >= s_start or current_time <= s_end %}
              {% endif %}
              
              {{ all_inactive and duration_met and not in_lock }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - choose: []
            default: !input absence_actions
