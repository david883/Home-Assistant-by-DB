blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >
    ### Version 1.3.0
    **Autor: D.B.**
    
    [![PayPal](https://img.shields.io/badge/Donate-PayPal-blue.svg)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)
    
    &nbsp;
    
    [![Import Blueprint](https://my.home-assistant.io/badges/blueprint_import.svg)](https://my.home-assistant.io/redirect/blueprint_import/?blueprint_url=https%3A%2F%2Fraw.githubusercontent.com%2Fdavid883%2FHome-Assistant-by-DB%2Frefs%2Fheads%2Fmain%2Fblueprints%2Fautomation%2FDB%2FAttendance%2520control%2FAttendance%2520control%2520DB.yaml)

    DE: Umfassende Logik zur Steuerung des Anwesenheitsstatus mit Aktivitätsprüfung und Nacht-Sperre.
    
    EN: Comprehensive presence control logic with activity check and night lock.
  domain: automation
  input:
    activity_sensors:
      name: "Aktivitäts-Sensoren / Activity Sensors"
      description: "DE: Sensoren für Anwesenheit. / EN: Presence sensors."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände / States"
      description: "DE: Aktive Zustände (z.B. on). / EN: Active states (e.g. on)."
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - "on"
            - "motion"
            - "occupied"
            - "home"
    presence_boolean:
      name: "Status Helfer / Status Helper"
      description: "DE: Input Boolean für Anwesenheit. / EN: Presence input boolean."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master: Anwesenheit / Presence"
      description: "DE: Automatik für Kommen. / EN: Auto-arriving."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit / Absence"
      description: "DE: Automatik für Gehen. / EN: Auto-leaving."
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit / Delay"
      description: "DE: Zeit bis Abwesenheit. / EN: Time until absence."
      default:
        minutes: 1
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn / Lock Start"
      description: "DE: Start der Nachtruhe. / EN: Start of night lock."
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende / Lock End"
      description: "DE: Ende der Nachtruhe. / EN: End of night lock."
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Counter Helfer / Counter Helper"
      description: "DE: Zähler für Impulse. / EN: Trigger counter."
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert / Threshold"
      description: "DE: Impulse für Anwesenheit. / EN: Triggers for presence."
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Counter Reset"
      description: "DE: Zeitfenster für Zähler. / EN: Window for counter."
      default: 5
      selector:
        number:
          min: 1
          max: 60
    absence_actions:
      name: "Aktionen Abwesenheit / Absence Actions"
      description: "DE: Aktionen beim Gehen. / EN: Actions when leaving."
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit / Presence Actions"
      description: "DE: Aktionen beim Kommen. / EN: Actions when arriving."
      default: []
      selector:
        action: {}

mode: restart

variables:
  sensors: !input activity_sensors
  states_list: !input activity_states
  delay_config: !input absence_delay
  threshold_val: !input counter_threshold
  counter_entity: !input presence_counter
  s_start: !input absence_forbidden_start
  s_end: !input absence_forbidden_end

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # GEHEN
      - conditions:
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: >
              {% set inactive = expand(sensors) | selectattr('state', 'in', states_list) | list | count == 0 %}
              {% set last_ch = expand(sensors) | map(attribute='last_changed') | max %}
              {% set wait = (delay_config.hours * 3600) + (delay_config.minutes * 60) + (delay_config.seconds) %}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if s_start < s_end %}
                {% set locked = s_start <= cur <= s_end %}
              {% else %}
                {% set locked = cur >= s_start or cur <= s_end %}
              {% endif %}
              {{ inactive and (now() - last_ch).total_seconds() >= wait and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # KOMMEN
      - conditions:
          - condition: state
            entity_id: !input master_switch_presence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: template
            value_template: >
              {{ expand(sensors) | selectattr('state', 'in', states_list) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(counter_entity) | int >= (threshold_val | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - choose: []
                default: !input presence_actions
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
