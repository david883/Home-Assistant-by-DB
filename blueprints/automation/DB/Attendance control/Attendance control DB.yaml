blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: "Version 1.3.5 - Fokus auf Stabilität und Texte."
  domain: automation
  input:
    activity_sensors:
      name: "Sensoren"
      description: "Bewegungsmelder oder Kontakte waehlen."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustaende Aktiv"
      description: "Welche Status gelten als anwesend (z.B. on)."
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Anwesenheits Helfer"
      description: "Der Input Boolean fuer den Status."
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit"
      description: "Zeit in Minuten bis auf Abwesend geschaltet wird."
      default:
        minutes: 1
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn"
      description: "Uhrzeit ab der NICHT auf abwesend geschaltet wird."
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende"
      description: "Uhrzeit ab der die Sperre endet."
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Counter Helfer"
      description: "Counter zum Filtern von Fehl-Impulsen."
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert"
      description: "Anzahl Impulse fuer Anwesend."
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Counter Reset Zeit"
      description: "Zeitfenster fuer den Zaehler."
      default: 5
      selector:
        number:
          min: 1
          max: 60
    absence_actions:
      name: "Aktionen Abwesenheit"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit"
      default: []
      selector:
        action: {}

mode: restart

variables:
  var_sensors: !input activity_sensors
  var_states: !input activity_states
  var_delay: !input absence_delay
  var_start: !input absence_forbidden_start
  var_end: !input absence_forbidden_end
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- FALL: ABWESEND ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: >
              {% set active = expand(var_sensors) | selectattr('state', 'in', var_states) | list | count > 0 %}
              {% set last = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set wait = (var_delay.hours * 3600) + (var_delay.minutes * 60) + (var_delay.seconds) %}
              {% set now_ts = as_timestamp(now()) %}
              {% set last_ts = as_timestamp(last) %}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if var_start < var_end %}
                {% set lock = var_start <= cur <= var_end %}
              {% else %}
                {% set lock = cur >= var_start or cur <= var_end %}
              {% endif %}
              {{ not active and (now_ts - last_ts) >= wait and not lock }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- FALL: ANWESEND ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(var_counter) | int >= (var_threshold | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - choose: []
                default: !input presence_actions
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
