blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >
    ### Version 1.3.2
    **Autor: D.B.**
    Logic: Presence / Absence Control.
  domain: automation
  input:
    activity_sensors:
      name: "Sensoren / Sensors"
      description: "DE: Bewegungsmelder oder Kontakte. / EN: Motion or contact sensors."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände / States"
      description: "DE: Status für 'Aktiv' (z.B. on). / EN: States for 'Active' (e.g. on)."
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Status Helfer / Status Helper"
      description: "DE: Dein Anwesenheits-Schalter. / EN: Your presence switch."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master: Anwesenheit / Presence"
      description: "DE: Automatik AN/AUS (Kommen). / EN: Auto-Present ON/OFF."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit / Absence"
      description: "DE: Automatik AN/AUS (Gehen). / EN: Auto-Absent ON/OFF."
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit / Delay"
      description: "DE: Zeit bis Abwesend-Status. / EN: Time until absent status."
      default:
        minutes: 1
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn / Lock Start"
      description: "DE: Nachtruhe Start. / EN: Night lock start."
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende / Lock End"
      description: "DE: Nachtruhe Ende. / EN: Night lock end."
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Counter Helfer / Counter Helper"
      description: "DE: Zähler für Impulse. / EN: Counter for triggers."
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert / Threshold"
      description: "DE: Impulse für Anwesenheit. / EN: Triggers for presence."
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Counter Reset"
      description: "DE: Zeitfenster für Zähler. / EN: Window for counter reset."
      default: 5
      selector:
        number:
          min: 1
          max: 60
    absence_actions:
      name: "Aktionen Abwesenheit / Absence Actions"
      description: "DE: Was beim Gehen passiert. / EN: Actions on leaving."
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit / Presence Actions"
      description: "DE: Was beim Kommen passiert. / EN: Actions on arriving."
      default: []
      selector:
        action: {}

mode: restart

variables:
  # Inputs als Variablen für die Logik bereitstellen
  var_sensors: !input activity_sensors
  var_states: !input activity_states
  var_delay: !input absence_delay
  var_s_start: !input absence_forbidden_start
  var_s_end: !input absence_forbidden_end
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- LOGIK: ABWESEND WERDEN ---
      - conditions:
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: >
              {# 1. Gibt es gerade aktive Sensoren? #}
              {% set active_now = expand(var_sensors) | selectattr('state', 'in', var_states) | list | count > 0 %}
              
              {# 2. Zeitberechnung #}
              {% set last_ch = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set diff = (now() - last_ch).total_seconds() | int %}
              {% set wait = (var_delay.hours * 3600) + (var_delay.minutes * 60) + (var_delay.seconds) %}
              
              {# 3. Nachtsperre #}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if var_s_start < var_s_end %}
                {% set is_locked = var_s_start <= cur <= var_s_end %}
              {% else %}
                {% set is_locked = cur >= var_s_start or cur <= var_s_end %}
              {% endif %}
              
              {{ not active_now and diff >= wait and not is_locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- LOGIK: ANWESEND WERDEN ---
      - conditions:
          - condition: state
            entity_id: !input master_switch_presence
            state: "on"
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(var_counter) | int >= (var_threshold | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - choose: []
                default: !input presence_actions
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
