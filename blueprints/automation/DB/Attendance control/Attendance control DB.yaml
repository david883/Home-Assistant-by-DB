blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >
    ### Version 1.2.7
    **Autor: D.B.**
    
    [![PayPal](https://img.shields.io/badge/Donate-PayPal-blue.svg)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)
    
    &nbsp;
    
    [![Import Blueprint](https://my.home-assistant.io/badges/blueprint_import.svg)](https://my.home-assistant.io/redirect/blueprint_import/?blueprint_url=https%3A%2F%2Fraw.githubusercontent.com%2Fdavid883%2FHome-Assistant-by-DB%2Frefs%2Fheads%2Fmain%2Fblueprints%2Fautomation%2FDB%2FAttendance%2520control%2FAttendance%2520control%2520DB.yaml)


    DE: Umfassende Logik zur Steuerung des Anwesenheitsstatus mit Aktivitätsprüfung, Nacht-Sperre und verzögerter Sofort-Abwesenheit.
    
    EN: Comprehensive logic for controlling presence status with activity checks, night lock, and delayed instant absence.
  domain: automation
  source_url: https://raw.githubusercontent.com/david883/Home-Assistant-by-DB/refs/heads/main/blueprints/automation/DB/Attendance%20control/Attendance%20control%20DB.yaml
  input:
    activity_sensors:
      name: "Aktivitäts-Sensoren / Activity Sensors"
      description: "DE: Sensoren, die Anwesenheit anzeigen. / EN: Sensors indicating presence."
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Aktivitäts-Zustände / Activity States"
      description: "DE: Zustände für Aktivität. / EN: States for activity."
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - "on"
            - "motion"
            - "occupied"
            - "home"
    instant_absence_switches:
      name: "Sofort-Abwesenheits-Schalter / Instant Absence Switches"
      description: "DE: Schalter für sofortiges Verlassen. / EN: Switches for instant departure."
      default: []
      selector:
        entity:
          multiple: true
    instant_absence_states:
      name: "Zustände für Sofort-Abwesenheit / Instant Absence States"
      description: "DE: Auslösende Zustände (z.B. locked). / EN: Triggering states (e.g. locked)."
      default: ["on"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - "on"
            - "off"
            - "pressed"
            - "locked"
    instant_absence_delay:
      name: "Verzögerung Sofort-Abwesenheit / Instant Absence Delay"
      description: "DE: Zeitpuffer beim Verlassen. / EN: Time buffer when leaving."
      default:
        minutes: 5
      selector:
        duration: {}
    presence_boolean:
      name: "Anwesenheits-Status / Presence Status"
      description: "DE: Der zentrale Status-Helfer. / EN: The central status helper."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master: Anwesenheit / Master: Presence"
      description: "DE: Erlaubt automatisches 'Anwesend'. / EN: Allows automatic 'Present'."
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit / Master: Absence"
      description: "DE: Erlaubt automatisches 'Abwesend'. / EN: Allows automatic 'Absent'."
      selector:
        entity:
          filter:
            domain: input_boolean
    absence_delay:
      name: "Wartezeit Abwesenheit / Absence Delay"
      description: "DE: Zeit ohne Aktivität bis Abwesenheit. / EN: Time without activity until absence."
      default:
        hours: 2
      selector:
        duration: {}
    absence_forbidden_start:
      name: "Sperre Beginn / Night Lock Start"
      default: "22:00:00"
      selector:
        time: {}
    absence_forbidden_end:
      name: "Sperre Ende / Night Lock End"
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Aktivitäts-Counter / Activity Counter"
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert / Threshold"
      default: 2
      selector:
        number:
          min: 1
          max: 10
          mode: box
    counter_reset_timeout:
      name: "Counter Reset Timeout"
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: "min"
          mode: slider
    absence_actions:
      name: "Aktionen Abwesenheit / Absence Actions"
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit / Presence Actions"
      default: []