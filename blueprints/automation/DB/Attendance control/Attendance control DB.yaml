blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >-
    ## 🛠 Installation & Support

    ### PayPal Spende - Donation
    Wenn dir dieser Blueprint gefällt, freue ich mich über eine kleine Unterstützung für die Kaffeekasse:
    
    [![PayPal Spende](https://www.paypalobjects.com/de_DE/DE/i/btn/btn_donateCC_LG.gif)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)
    
    ---
    
    ### Version 14.04.2026-2
    **Autor: D.B.**

    DE: Präzise Sensor-Automatik mit robuster Nachtsperre (Minuten-Vergleich) und vollständigen Beschreibungen.
    
    EN: Precise sensor automation with robust night lock (minute comparison) and full descriptions.
  domain: automation
  source_url: https://github.com/david883/Home-Assistant-by-DB/blob/main/blueprints%2Fautomation%2FDB%2FAttendance%20control%2FAttendance%20control%20DB.yaml
  input:
    activity_sensors:
      name: "Sensoren - Sensors"
      description: >-
        DE: Sensoren, die Anwesenheit anzeigen (z.B. Bewegungsmelder, Türkontakte).
        
        EN: Sensors indicating presence (e.g., motion detectors, door contacts).
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände Aktiv - Active States"
      description: >-
        DE: Zustände, die als AKTIV gelten (z.B. on, motion, home).
        
        EN: States considered ACTIVE (e.g., on, motion, home).
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    presence_boolean:
      name: "Anwesenheits Status - Presence Status"
      description: >-
        DE: Der zentrale Helfer-Schalter (Input Boolean) für den aktuellen Status.
        
        EN: The central helper switch (input boolean) for the current status.
      selector:
        entity:
          filter:
            domain: input_boolean
    master_presence_enabled:
      name: "Master: Anwesenheit aktivieren - Master: Presence enabled"
      description: >-
        DE: Erlaubt das automatische Setzen auf 'Anwesend' bei Sensor-Aktivität.
        
        EN: Allows automatic setting to 'Present' upon sensor activity.
      default: true
      selector:
        boolean: {}
    master_absence_enabled:
      name: "Master: Abwesenheit aktivieren - Master: Absence enabled"
      description: >-
        DE: Erlaubt das automatische Setzen auf 'Abwesend' nach Ablauf der Wartezeit.
        
        EN: Allows automatic setting to 'Absent' after the delay expires.
      default: true
      selector:
        boolean: {}
    absence_delay:
      name: "Wartezeit Abwesenheit - Absence Delay"
      description: >-
        DE: Zeit ohne Sensor-Aktivität, bis die Automatik auf ABWESEND schaltet.
        
        EN: Time without sensor activity until the automation switches to ABSENT.
      default:
        minutes: 1
      selector:
        duration: {}
    night_lock_start:
      name: "Nachtsperre beginnt um - Night lock starts at"
      description: >-
        DE: Uhrzeit, ab der kein automatisches Abwesend-Schalten erfolgt (z.B. Schlafenszeit).
        
        EN: Time from which no automatic absence switching occurs (e.g., bedtime).
      default: "22:00:00"
      selector:
        time: {}
    night_lock_end:
      name: "Nachtsperre endet um - Night lock ends at"
      description: >-
        DE: Uhrzeit, ab der die Nachtsperre wieder aufgehoben ist.
        
        EN: Time when the night lock is lifted again.
      default: "08:00:00"
      selector:
        time: {}
    presence_counter:
      name: "Aktivitäts Counter - Activity Counter"
      description: >-
        DE: Counter-Helfer, der die Sensor-Impulse zählt, bevor auf ANWESEND geschaltet wird.
        
        EN: Counter helper that counts sensor triggers before switching to PRESENT.
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert - Threshold"
      description: >-
        DE: Anzahl der nötigen Sensor-Impulse innerhalb des Zeitfensters für den Status 'Anwesend'.
        
        EN: Number of required sensor triggers within the time window for the 'Present' status.
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Zeitfenster für Impulse - Counter Reset Timeout"
      description: >-
        DE: Zeitraum in Minuten, in dem die Impulse für den Schwellenwert erfolgen müssen.
        
        EN: Period in minutes within which the triggers for the threshold must occur.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: "min"
    absence_actions:
      name: "Aktionen Abwesenheit - Absence Actions"
      description: >-
        DE: Aktionen, die beim Wechsel in den Status ABWESEND ausgeführt werden (z.B. Licht aus).
        
        EN: Actions executed when switching to ABSENT status (e.g., lights off).
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit - Presence Actions"
      description: >-
        DE: Aktionen, die beim Wechsel in den Status ANWESEND ausgeführt werden (z.B. Licht an).
        
        EN: Actions executed when switching to PRESENT status (e.g., lights on).
      default: []
      selector:
        action: {}

mode: parallel
max: 10

variables:
  var_sensors: !input activity_sensors
  var_states_active: !input activity_states
  var_delay: !input absence_delay
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold
  var_lock_start: !input night_lock_start
  var_lock_end: !input night_lock_end
  var_master_presence: !input master_presence_enabled
  var_master_absence: !input master_absence_enabled
  var_reset_min: !input counter_reset_timeout
  var_presence_boolean: !input presence_boolean

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- FALL 1: AUTOMATISCH ABWESEND ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: template
            value_template: "{{ var_master_absence }}"
          - condition: template
            value_template: >
              {% set active = expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count == 0 %}
              {% set last_ch = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set h = var_delay.hours | default(0) | int %}
              {% set m = var_delay.minutes | default(0) | int %}
              {% set s = var_delay.seconds | default(0) | int %}
              {% set wait = (h * 3600) + (m * 60) + s %}
              {% set time_ok = (as_timestamp(now()) - as_timestamp(last_ch)) >= (wait - 1) %}
              
              {% set now_min = now().hour * 60 + now().minute %}
              {% set start_parts = var_lock_start.split(':') %}
              {% set start_min = start_parts[0]|int * 60 + start_parts[1]|int %}
              {% set end_parts = var_lock_end.split(':') %}
              {% set end_min = end_parts[0]|int * 60 + end_parts[1]|int %}
              
              {% if start_min < end_min %}
                {% set locked = start_min <= now_min < end_min %}
              {% else %}
                {% set locked = now_min >= start_min or now_min < end_min %}
              {% endif %}
              
              {{ active and time_ok and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - delay: "00:00:01"
          - choose: []
            default: !input absence_actions

      # --- FALL 2: ANWESEND WERDEN / COUNTER LOGIK ---
      - conditions:
          - condition: template
            value_template: "{{ var_master_presence }}"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count > 0 or states(var_counter)|int > 0 }}
        sequence:
          - if:
              - condition: template
                value_template: >
                  {% set last_ch = expand(var_sensors) | map(attribute='last_changed') | max %}
                  {% set diff = (as_timestamp(now()) - as_timestamp(last_ch)) / 60 %}
                  {{ diff > var_reset_min and states(var_counter)|int > 0 }}
            then:
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
            else:
              - if:
                  - condition: template
                    value_template: >
                      {{ trigger.entity_id in var_sensors and states(trigger.entity_id) in var_states_active 
                         and states(var_presence_boolean) == 'off' }}
                then:
                  - action: counter.increment
                    target:
                      entity_id: !input presence_counter
              - if:
                  - condition: template
                    value_template: "{{ states(var_counter) | int >= (var_threshold | int) and states(var_presence_boolean) == 'off' }}"
                then:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: !input presence_boolean
                  - action: counter.reset
                    target:
                      entity_id: !input presence_counter
                  - delay: "00:00:01"
                  - choose: []
                    default: !input presence_actions
