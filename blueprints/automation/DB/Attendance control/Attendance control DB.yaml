blueprint:
  name: "Anwesenheits-Steuerung DB"
  description: >-
    ### Version 1.4.5
    **Autor: D.B.**

    DE: Logik mit multiplen Sofort-Auslösern, definierbaren Status-Listen und Nachtsperre über Helfer.
    
    EN: Logic with multiple instant-off triggers, definable state lists, and night lock via helpers.
  domain: automation
  input:
    activity_sensors:
      name: "Sensoren / Sensors"
      description: >-
        DE: Sensoren, die Anwesenheit anzeigen (BWM, Kontakte).
        
        EN: Sensors indicating presence (Motion, Contacts).
      selector:
        entity:
          multiple: true
    activity_states:
      name: "Zustände Aktiv / Active States"
      description: >-
        DE: Zustände, die als AKTIV gelten (z.B. on, motion).
        
        EN: States considered ACTIVE (e.g. on, motion).
      default: ["on", "motion", "occupied"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "motion", "occupied", "home"]
    inactive_states:
      name: "Zustände Inaktiv / Inactive States"
      description: >-
        DE: Zustände, die als INAKTIV gelten (z.B. off, closed).
        
        EN: States considered INACTIVE (e.g. off, closed).
      default: ["off", "closed", "unavailable"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["off", "closed", "unavailable", "not_home"]
    presence_boolean:
      name: "Anwesenheits Status / Presence Status"
      description: >-
        DE: Der zentrale Helfer-Schalter für den Status.
        
        EN: The central helper switch for the status.
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_presence:
      name: "Master: Anwesenheit / Master: Presence"
      description: >-
        DE: Erlaubt automatisches Setzen auf 'Anwesend'.
        
        EN: Allows automatic setting to 'Present'.
      selector:
        entity:
          filter:
            domain: input_boolean
    master_switch_absence:
      name: "Master: Abwesenheit / Master: Absence"
      description: >-
        DE: Erlaubt automatisches Setzen auf 'Abwesend'.
        
        EN: Allows automatic setting to 'Absent'.
      selector:
        entity:
          filter:
            domain: input_boolean
    manual_absence_triggers:
      name: "Sofort-Abwesend Auslöser / Instant Absence Triggers"
      description: >-
        DE: Liste von Objekten (Taster, Schalter), die sofort Abwesenheit auslösen.
        
        EN: List of entities (buttons, switches) that trigger instant absence.
      selector:
        entity:
          multiple: true
    manual_absence_states:
      name: "Zustände für Sofort-Aus / States for Instant Absence"
      description: >-
        DE: Auf welche Zustände der Auslöser soll reagiert werden? (z.B. on).
        
        EN: Which states of the triggers should be reacted to? (e.g. on).
      default: ["on"]
      selector:
        select:
          multiple: true
          custom_value: true
          options: ["on", "off", "pressed", "active"]
    manual_absence_delay:
      name: "Verzögerung für Sofort-Schalter / Delay for Instant Switch"
      description: >-
        DE: Zeit, die nach dem Auslösen gewartet wird.
        
        EN: Delay after triggering.
      default:
        seconds: 0
      selector:
        duration: {}
    absence_delay:
      name: "Wartezeit Abwesenheit / Absence Delay"
      description: >-
        DE: Zeit ohne Aktivität bis zur automatischen Abwesenheit.
        
        EN: Time without activity until automatic absence.
      default:
        minutes: 1
      selector:
        duration: {}
    night_lock_start_helper:
      name: "Nachtsperre beginnt um / Night lock starts at"
      description: >-
        DE: Helfer (nur Uhrzeit) für den Start der Sperre.
        
        EN: Helper (time only) for lock start.
      selector:
        entity:
          filter:
            domain: input_datetime
    night_lock_end_helper:
      name: "Nachtsperre endet um / Night lock ends at"
      description: >-
        DE: Helfer (nur Uhrzeit) für das Ende der Sperre.
        
        EN: Helper (time only) for lock end.
      selector:
        entity:
          filter:
            domain: input_datetime
    presence_counter:
      name: "Aktivitäts Counter / Activity Counter"
      description: >-
        DE: Counter-Helfer zum Filtern von Störungen.
        
        EN: Counter helper to filter triggers.
      selector:
        entity:
          filter:
            domain: counter
    counter_threshold:
      name: "Schwellenwert / Threshold"
      description: >-
        DE: Anzahl der Impulse für Status 'Anwesend'.
        
        EN: Number of triggers needed for 'Present'.
      default: 2
      selector:
        number:
          min: 1
          max: 10
    counter_reset_timeout:
      name: "Zeitfenster für Impulse / Counter Reset Timeout"
      description: >-
        DE: Innerhalb wie vieler Minuten müssen die Impulse erfolgen?
        
        EN: Triggers must occur within this many minutes.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: "min"
    absence_actions:
      name: "Aktionen Abwesenheit / Absence Actions"
      description: >-
        DE: Aktionen beim Verlassen.
        
        EN: Actions when leaving.
      default: []
      selector:
        action: {}
    presence_actions:
      name: "Aktionen Anwesenheit / Presence Actions"
      description: >-
        DE: Aktionen beim Ankommen.
        
        EN: Actions when arriving.
      default: []
      selector:
        action: {}

mode: restart

variables:
  var_sensors: !input activity_sensors
  var_states_active: !input activity_states
  var_delay: !input absence_delay
  var_counter: !input presence_counter
  var_threshold: !input counter_threshold
  var_lock_start_ent: !input night_lock_start_helper
  var_lock_end_ent: !input night_lock_end_helper
  var_manual_ents: !input manual_absence_triggers
  var_manual_states: !input manual_absence_states

trigger:
  - platform: state
    entity_id: !input activity_sensors
  - platform: state
    entity_id: !input manual_absence_triggers
  - platform: time_pattern
    minutes: "/1"

action:
  - choose:
      # --- FALL 1: SOFORT ABWESEND (Manueller Auslöser Liste) ---
      - conditions:
          - condition: template
            value_template: >
              {{ expand(var_manual_ents) | selectattr('state', 'in', var_manual_states) | list | count > 0 }}
        sequence:
          - delay: !input manual_absence_delay
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          # Automatisches Zurücksetzen für input_booleans in der Liste
          - repeat:
              for_each: "{{ var_manual_ents }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ device_domain(repeat.item) == 'input_boolean' and states(repeat.item) in var_manual_states }}"
                  then:
                    - action: input_boolean.turn_off
                      target:
                        entity_id: "{{ repeat.item }}"
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- FALL 2: AUTOMATISCH ABWESEND ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "on"
          - condition: state
            entity_id: !input master_switch_absence
            state: "on"
          - condition: template
            value_template: >
              {% set active_count = expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count %}
              {% set last_changed = expand(var_sensors) | map(attribute='last_changed') | max %}
              {% set h = var_delay.hours | default(0) | int %}
              {% set m = var_delay.minutes | default(0) | int %}
              {% set s = var_delay.seconds | default(0) | int %}
              {% set wait_sec = (h * 3600) + (m * 60) + s %}
              {% set time_ok = (as_timestamp(now()) - as_timestamp(last_changed)) >= (wait_sec - 2) %}
              {% set start_time = states(var_lock_start_ent) %}
              {% set end_time = states(var_lock_end_ent) %}
              {% set cur = now().strftime('%H:%M:%S') %}
              {% if start_time < end_time %}
                {% set locked = start_time <= cur <= end_time %}
              {% else %}
                {% set locked = cur >= start_time or cur <= end_time %}
              {% endif %}
              {{ active_count == 0 and time_ok and not locked }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input presence_boolean
          - action: counter.reset
            target:
              entity_id: !input presence_counter
          - choose: []
            default: !input absence_actions

      # --- FALL 3: ANWESEND WERDEN ---
      - conditions:
          - condition: state
            entity_id: !input presence_boolean
            state: "off"
          - condition: state
            entity_id: !input master_switch_presence
            state: "on"
          - condition: template
            value_template: >
              {{ expand(var_sensors) | selectattr('state', 'in', var_states_active) | list | count > 0 }}
        sequence:
          - action: counter.increment
            target:
              entity_id: !input presence_counter
          - if:
              - condition: template
                value_template: "{{ states(var_counter) | int >= (var_threshold | int) }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: !input presence_boolean
              - action: counter.reset
                target:
                  entity_id: !input presence_counter
              - choose: []
                default: !input presence_actions
            else:
              - wait_for_trigger:
                  - platform: state
                    entity_id: !input activity_sensors
                timeout:
                  minutes: !input counter_reset_timeout
                continue_on_timeout: true
              - if:
                  - condition: template
                    value_template: "{{ wait.trigger == none }}"
                then:
                  - action: counter.reset
                    target:
                      entity_id: !input presence_counter
