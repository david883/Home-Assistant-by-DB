blueprint:
  name: "Universelle Statusüberwachung DB"
  description: >
    #### Version 11.04.2026-7 Autor: D.B.
    Überwacht Entitäten und speichert die Gesamtzahl der überwachten Geräte direkt im Zahlen-Helfer.
  source_url: https://raw.githubusercontent.com/david883/Home-Assistant-by-DB/refs/heads/main/blueprints/automation/DB/Universal%20status%2520monitoring/Universal%2520status%2520monitoring.yaml
  domain: automation
  input:
    monitored_entities:
      name: "Zu überwachende Entitäten"
      selector:
        entity:
          multiple: true
    offline_states:
      name: "Offline Status-Wörter"
      default: [unavailable, unknown, not_home, offline, "off"]
      selector:
        select:
          multiple: true
          custom_value: true
    online_states:
      name: "Online Status-Wörter"
      default: [available, home, online, "on"]
      selector:
        select:
          multiple: true
          custom_value: true
    offline_duration:
      name: "Offline Wartezeit (Minuten)"
      default: 5
      selector:
        number:
          min: 0
          max: 60
    online_duration:
      name: "Online Wartezeit (Minuten)"
      default: 2
      selector:
        number:
          min: 0
          max: 60
    memory_helper:
      name: "Gedächtnis Helfer (input_select)"
      selector:
        entity:
          domain: input_select
    counter_helper:
      name: "Zähler Helfer (input_number)"
      selector:
        entity:
          domain: input_number
    offline_actions:
      name: "Aktionen bei Offline"
      default: []
      selector:
        action: {}
    online_actions:
      name: "Aktionen bei Online"
      default: []
      selector:
        action: {}

mode: parallel
max: 50

trigger:
  - trigger: state
    entity_id: !input monitored_entities
    for:
      minutes: !input offline_duration
    id: "trigger_offline"
    to: !input offline_states
  - trigger: state
    entity_id: !input monitored_entities
    for:
      minutes: !input online_duration
    id: "trigger_online"
    to: !input online_states

action:
  - variables:
      memory: !input memory_helper
      counter: !input counter_helper
      monitored: !input monitored_entities
      off_states: !input offline_states
      threshold: !input offline_duration
      trigger_ent: "{{ trigger.entity_id }}"
      device: "{{ state_attr(trigger_ent, 'friendly_name') or trigger_ent }}"
      current_options: "{{ state_attr(memory, 'options') or [] }}"
      # Gesamtzahl der überwachten Geräte
      total_monitored: "{{ monitored | count }}"

  - choose:
      # OFFLINE
      - conditions:
          - condition: trigger
            id: "trigger_offline"
          - "{{ trigger_ent not in current_options }}"
        sequence:
          - variables:
              new_list_offline: "{{ (current_options + [trigger_ent, 'Platzhalter']) | unique | list }}"
              count: "{{ new_list_offline | reject('eq', 'Platzhalter') | list | count }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_offline }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "{{ trigger_ent }}"
          # Wir speichern den Count UND die Gesamtzahl (als Attribut)
          - service: python_script.set_state # Alternativ über ein generisches Script
            continue_on_error: true
            data:
              entity_id: "{{ counter }}"
              state: "{{ count }}"
              total_monitored: "{{ total_monitored }}"
          # Einfacher Weg ohne Python Script: Wir nutzen nur den Standard Service
          - service: input_number.set_value
            data:
              entity_id: "{{ counter }}"
              value: "{{ count }}"
          - sequence: !input offline_actions

      # ONLINE
      - conditions:
          - condition: trigger
            id: "trigger_online"
          - "{{ trigger_ent in current_options }}"
        sequence:
          - variables:
              new_list_online: "{{ (current_options | reject('eq', trigger_ent) | list + ['Platzhalter']) | unique | list }}"
              count: "{{ new_list_online | reject('eq', 'Platzhalter') | list | count }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_online }}"
          - service: input_number.set_value
            data:
              entity_id: "{{ counter }}"
              value: "{{ count }}"
          - sequence: !input online_actions
