blueprint:
  name: "Universelle Statusüberwachung DB"
  description: >
    #### Version 04.04.2026-9 Autor: D.B.

    #### [![Import Blueprint to HA](https://img.shields.io/badge/Import%20Blueprint-to%20HA-blue?style=for-the-badge&logo=homeassistant)](https://my.home-assistant.io/redirect/blueprint_import/?blueprint_url=https%3A%2F%2Fraw.githubusercontent.com%2Fdavid883%2FHome-Assistant-by-DB%2Frefs%2Fheads%2Fmain%2Fblueprints%2Fautomation%2FDB%2FUniversal%2520status%2520monitoring%2FUniversal%2520status%2520monitoring.yaml)

    ---

    #### Dir gefällt meine Arbeit? 
    #### Lade mich doch auf einen Kaffee oder ein kühles Getränk ein. Ich freue mich über jede kleine Unterstützung!

    [![PayPal Spende](https://www.paypalobjects.com/de_DE/i/btn/btn_donateCC_LG.gif)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)

    ---

    Überwacht Entitäten rein auf Statusänderungen (z.B. unavailable, offline, off, usw. diese sind selbst änderbar).
    
    Je nach Status kann eine oder mehrere Aktionen ausgeführt werden.

  source_url: https://raw.githubusercontent.com/david883/Home-Assistant-by-DB/refs/heads/main/blueprints/automation/DB/Universal%20status%20monitoring/Universal%20status%20monitoring.yaml
  domain: automation
  input:
    monitored_entities:
      name: "Zu überwachende Entitäten / Entities to monitor"
      selector:
        entity:
          multiple: true
    offline_states:
      name: "Offline Status-Wörter / Offline States"
      default: [unavailable, unknown, not_home, offline, "off"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: unavailable
              value: unavailable
            - label: "off"
              value: "off"
            - label: offline
              value: offline
            - label: not_home
              value: not_home
            - label: unknown
              value: unknown
    online_states:
      name: "Online Status-Wörter / Online States"
      default: [available, home, online, "on"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: available
              value: available
            - label: "on"
              value: "on"
            - label: home
              value: home
            - label: online
              value: online
    offline_duration:
      name: "Offline Wartezeit (Minuten) / Offline duration"
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
    online_duration:
      name: "Online Wartezeit (Minuten) / Online duration"
      default: 2
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
    offline_actions:
      name: "Aktionen bei Offline / Offline Actions"
      default:
        - service: input_text.set_value
          target:
            entity_id: input_text.benachrichtigung_zum_verarbeiten
          data:
            value: "David: Das Gerät {{ device }} ist seit 5 Minuten nicht mehr erreichbar, folgende Geräte sind noch offline: {{ list }}"
        - service: input_text.set_value
          target:
            entity_id: input_text.netzwerkgerate_offline
          data:
            value: "Das Gerät {{ device }} ist offline. Weitere Geräte die offline sind {{ list }}"
      selector:
        action: {}
    online_actions:
      name: "Aktionen bei Online / Online Actions"
      default:
        - service: input_text.set_value
          target:
            entity_id: input_text.benachrichtigung_zum_verarbeiten
          data:
            value: "David: Das Gerät {{ device }} ist wieder erreichbar, folgende Geräte sind noch offline: {{ list }}"
      selector:
        action: {}

mode: parallel

trigger:
  - trigger: state
    entity_id: !input monitored_entities
    for:
      minutes: !input offline_duration
    id: "trigger_offline"
    to: !input offline_states
  - trigger: state
    entity_id: !input monitored_entities
    for:
      minutes: !input online_duration
    id: "trigger_online"
    to: !input online_states

action:
  - variables:
      monitored: !input monitored_entities
      off_states: !input offline_states
      on_states: !input online_states
      off_dur: !input offline_duration
      trigger_ent: "{{ trigger.entity_id }}"
      device: "{{ state_attr(trigger_ent, 'friendly_name') or trigger_ent }}"
      list: >
        {% set names = namespace(items=[]) %}
        {% for ent in monitored %}
          {% if ent != trigger_ent %}
            {% if states(ent) in off_states %}
              {% set names.items = names.items + [state_attr(ent, 'friendly_name') or ent] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ names.items | join(', ') if names.items | count > 0 else 'keine weiteren' }}

  - choose:
      # OFFLINE: Nachricht senden, wenn Gerät stabil offline ist
      - conditions:
          - condition: trigger
            id: "trigger_offline"
        sequence: !input offline_actions

      # ONLINE: Nachricht senden, aber nur wenn es vorher wirklich weg war
      - conditions:
          - condition: trigger
            id: "trigger_online"
          - condition: template
            # Wir prüfen: Ist der Status, aus dem wir kommen, in der Offline-Liste?
            # UND: Ist die Zeit seit dem LETZTEN Mal, als das Gerät ONLINE war, größer als die Offline-Wartezeit?
            value_template: >
              {% set last_on = states[trigger_ent].last_changed if states(trigger_ent) in on_states else now() %}
              {{ trigger.from_state.state in off_states }}
        sequence: !input online_actions
