blueprint:
  name: "Universelle Statusüberwachung DB"
  description: >
    #### Version 19.04.2026-1 Autor: D.B.

    #### [![Import Blueprint to HA](https://img.shields.io/badge/Import%20Blueprint-to%20HA-blue?style=for-the-badge&logo=homeassistant)](https://my.home-assistant.io/redirect/blueprint_import/?blueprint_url=https%3A%2F%2Fraw.githubusercontent.com%2Fdavid883%2FHome-Assistant-by-DB%2Frefs%2Fheads%2Fmain%2Fblueprints%2Fautomation%2FDB%2FUniversal%2520status%2520monitoring%2FUniversal%2520status%2520monitoring.yaml)

    ---

    #### Dir gefällt meine Arbeit? Lade mich doch auf einen Kaffee ein! / Do you like my work? Buy me a coffee!

    [![PayPal Spende](https://www.paypalobjects.com/de_DE/i/btn/btn_donateCC_LG.gif)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)

    ---

    Überwacht Entitäten auf Statusänderungen. Nutzt eine Auswahlliste als Gedächtnis, reinigt sich bei Geräte-Entfernung selbst und zählt überwachte Geräte.
    Monitors entities for state changes. Uses a dropdown as memory, auto-cleans on device removal, and counts monitored devices.

  source_url: https://raw.githubusercontent.com/david883/Home-Assistant-by-DB/refs/heads/main/blueprints/automation/DB/Universal%2520status%2520monitoring/Universal%2520status%2520monitoring.yaml
  domain: automation
  input:
    monitored_entities:
      name: "Zu überwachende Entitäten / Entities to monitor"
      selector:
        entity:
          multiple: true
    offline_states:
      name: "Offline Status-Wörter / Offline States"
      default: [unavailable, unknown, not_home, offline, "off"]
      selector:
        select:
          multiple: true
          custom_value: true
    online_states:
      name: "Online Status-Wörter / Online States"
      default: [available, home, online, "on"]
      selector:
        select:
          multiple: true
          custom_value: true
    offline_duration:
      name: "Offline Wartezeit (Minuten) / Offline duration"
      default: 5
      selector:
        number:
          min: 0
          max: 60
    online_duration:
      name: "Online Wartezeit (Minuten) / Online duration"
      default: 2
      selector:
        number:
          min: 0
          max: 60
    memory_helper:
      name: "Gedächtnis Helfer (input_select) / Memory Helper"
      selector:
        entity:
          domain: input_select
    counter_helper_total:
      name: "Zähler: Überwacht Gesamt (input_number) / Counter: Total Monitored"
      selector:
        entity:
          domain: input_number
    offline_actions:
      name: "Aktionen bei Offline / Offline Actions"
      default: []
      selector:
        action: {}
    online_actions:
      name: "Aktionen bei Online / Online Actions"
      default: []
      selector:
        action: {}

mode: parallel
max: 50

action:
  # 1. BEREINIGUNG: Entfernt Geräte, die nicht mehr in der Liste sind
  - variables:
      memory: !input memory_helper
      monitored: !input monitored_entities
      mem_options: "{{ state_attr(memory, 'options') or [] }}"
      clean_list: "{{ mem_options | select('in', monitored + ['Platzhalter']) | list }}"
  
  - condition: template
    value_template: "{{ mem_options | count != clean_list | count }}"
    
  - service: input_select.set_options
    target:
      entity_id: "{{ memory }}"
    data:
      options: "{{ clean_list }}"

  # 2. HAUPTLOGIK
  - variables:
      counter_total: !input counter_helper_total
      off_states: !input offline_states
      threshold: !input offline_duration
      trigger_ent: "{{ trigger.entity_id }}"
      device: "{{ state_attr(trigger_ent, 'friendly_name') or trigger_ent }}"
      current_options: "{{ state_attr(memory, 'options') or [] }}"
      total_count: "{{ monitored | count }}"
      
      list: >
        {% set names = namespace(items=[]) %}
        {% for ent in monitored %}
          {% if ent != trigger_ent and states(ent) in off_states %}
            {% set names.items = names.items + [state_attr(ent, 'friendly_name') or ent] %}
          {% endif %}
        {% endfor %}
        {{ names.items | join(', ') if names.items | count > 0 else 'keine' }}

  # Gesamtzahl in Helfer schreiben
  - service: input_number.set_value
    data:
      entity_id: "{{ counter_total }}"
      value: "{{ total_count }}"

  - choose:
      # OFFLINE
      - conditions:
          - condition: trigger
            id: "trigger_offline"
          - "{{ trigger_ent not in current_options }}"
        sequence:
          - variables:
              new_list_offline: "{{ (current_options + [trigger_ent, 'Platzhalter']) | unique | list }}"
              count: "{{ new_list_offline | reject('eq', 'Platzhalter') | list | count }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_offline }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "{{ trigger_ent }}"
          - sequence: !input offline_actions

      # ONLINE
      - conditions:
          - condition: trigger
            id: "trigger_online"
          - "{{ trigger_ent in current_options }}"
        sequence:
          - variables:
              new_list_online: "{{ (current_options | reject('eq', trigger_ent) | list + ['Platzhalter']) | unique | list }}"
              count: "{{ new_list_online | reject('eq', 'Platzhalter') | list | count }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_online }}"
          - sequence: !input online_actions
