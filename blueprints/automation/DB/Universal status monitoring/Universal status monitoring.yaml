blueprint:
  name: "Universelle Statusüberwachung DB"
  description: >
    #### Version 11.04.2026-6 Autor: D.B.

    #### [![Import Blueprint to HA](https://img.shields.io/badge/Import%20Blueprint-to%20HA-blue?style=for-the-badge&logo=homeassistant)](https://my.home-assistant.io/redirect/blueprint_import/?blueprint_url=https%3A%2F%2Fraw.githubusercontent.com%2Fdavid883%2FHome-Assistant-by-DB%2Frefs%2Fheads%2Fmain%2Fblueprints%2Fautomation%2FDB%2FUniversal%2520status%2520monitoring%2FUniversal%2520status%2520monitoring.yaml)

    ---

    #### Dir gefällt meine Arbeit? 
    #### Lade mich doch auf einen Kaffee oder ein kühles Getränk ein. Ich freue mich über jede kleine Unterstützung!
    #### Do you like my work? Feel free to buy me a coffee or a cool drink. I appreciate any support!

    [![PayPal Spende](https://www.paypalobjects.com/de_DE/i/btn/btn_donateCC_LG.gif)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)

    ---

    Überwacht Entitäten auf Statusänderungen. Stellt Variablen wie {{ device }}, {{ threshold }}, {{ list }} und {{ count }} für Aktionen bereit.

  source_url: https://raw.githubusercontent.com/david883/Home-Assistant-by-DB/refs/heads/main/blueprints/automation/DB/Universal%20status%20monitoring/Universal%20status%20monitoring.yaml
  domain: automation
  input:
    monitored_entities:
      name: "Zu überwachende Entitäten / Entities to monitor"
      selector:
        entity:
          multiple: true
    offline_states:
      name: "Offline Status-Wörter / Offline States"
      default: [unavailable, unknown, not_home, offline, "off"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: "unavailable"
              value: "unavailable"
            - label: "unknown"
              value: "unknown"
            - label: "offline"
              value: "offline"
            - label: "off"
              value: "off"
            - label: "not_home"
              value: "not_home"
    online_states:
      name: "Online Status-Wörter / Online States"
      default: [available, home, online, "on"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: "available"
              value: "available"
            - label: "online"
              value: "online"
            - label: "home"
              value: "home"
            - label: "on"
              value: "on"
    offline_duration:
      name: "Offline Wartezeit (Minuten) / Offline duration"
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: min
    online_duration:
      name: "Online Wartezeit (Minuten) / Online duration"
      default: 2
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: min
    memory_helper:
      name: "Gedächtnis Helfer / Memory Helper"
      selector:
        entity:
          domain: input_select
    counter_helper:
      name: "Zähler Helfer / Counter Helper"
      selector:
        entity:
          domain: input_number
    offline_actions:
      name: "Aktionen bei Offline / Offline Actions"
      default:
        - service: input_text.set_value
          target:
            entity_id: input_text.benachrichtigung_zum_verarbeiten
          data:
            value: "David: {{ device }} ist seit {{ threshold }} Min. offline. Andere: {{ list }}. (Gesamt: {{ count }})"
      selector:
        action: {}
    online_actions:
      name: "Aktionen bei Online / Online Actions"
      default:
        - service: input_text.set_value
          target:
            entity_id: input_text.benachrichtigung_zum_verarbeiten
          data:
            value: "David: {{ device }} ist wieder erreichbar. Andere offline: {{ list }}. (Gesamt: {{ count }})"
      selector:
        action: {}

mode: parallel
max: 50

trigger:
  - trigger: state
    entity_id: !input monitored_entities
    for:
      minutes: !input offline_duration
    id: "trigger_offline"
    to: !input offline_states
  - trigger: state
    entity_id: !input monitored_entities
    for:
      minutes: !input online_duration
    id: "trigger_online"
    to: !input online_states

action:
  - variables:
      memory: !input memory_helper
      counter: !input counter_helper
      monitored: !input monitored_entities
      off_states: !input offline_states
      # Schwellenwert aus dem Input holen
      threshold: !input offline_duration
      trigger_ent: "{{ trigger.entity_id }}"
      device: "{{ state_attr(trigger_ent, 'friendly_name') or trigger_ent }}"
      current_options: "{{ state_attr(memory, 'options') or [] }}"
      
      # Liste berechnen
      list: >
        {% set names = namespace(items=[]) %}
        {% for ent in monitored %}
          {% if ent != trigger_ent and states(ent) in off_states %}
            {% set names.items = names.items + [state_attr(ent, 'friendly_name') or ent] %}
          {% endif %}
        {% endfor %}
        {{ names.items | join(', ') if names.items | count > 0 else 'keine' }}

  - choose:
      # OFFLINE
      - conditions:
          - condition: trigger
            id: "trigger_offline"
          - "{{ trigger_ent not in current_options }}"
        sequence:
          - variables:
              new_list_offline: "{{ (current_options + [trigger_ent, 'Platzhalter']) | unique | list }}"
              # Count berechnen (ohne Platzhalter)
              count: "{{ new_list_offline | reject('eq', 'Platzhalter') | list | count }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_offline }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "{{ trigger_ent }}"
          - service: input_number.set_value
            data:
              entity_id: "{{ counter }}"
              value: "{{ count }}"
          - sequence: !input offline_actions

      # ONLINE
      - conditions:
          - condition: trigger
            id: "trigger_online"
          - "{{ trigger_ent in current_options }}"
        sequence:
          - variables:
              new_list_online: "{{ (current_options | reject('eq', trigger_ent) | list + ['Platzhalter']) | unique | list }}"
              # Count berechnen (ohne Platzhalter)
              count: "{{ new_list_online | reject('eq', 'Platzhalter') | list | count }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_online }}"
          - service: input_number.set_value
            data:
              entity_id: "{{ counter }}"
              value: "{{ count }}"
          - sequence: !input online_actions
