blueprint:
  name: "Universelle Statusüberwachung DB"
  description: >
    #### Version 19.04.2026-2 Autor: D.B.

    Überwacht Entitäten auf Statusänderungen. Nutzt eine Auswahlliste als Gedächtnis, reinigt sich bei Geräte-Entfernung selbst und zählt überwachte Geräte.

  domain: automation
  input:
    monitored_entities:
      name: "Zu überwachende Entitäten"
      selector:
        entity:
          multiple: true
    offline_states:
      name: "Offline Status-Wörter"
      default: ["unavailable", "unknown", "not_home", "offline", "off"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: "unavailable"
              value: "unavailable"
            - label: "unknown"
              value: "unknown"
            - label: "offline"
              value: "offline"
            - label: "off"
              value: "off"
            - label: "not_home"
              value: "not_home"
    online_states:
      name: "Online Status-Wörter"
      default: ["available", "home", "online", "on"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: "available"
              value: "available"
            - label: "online"
              value: "online"
            - label: "home"
              value: "home"
            - label: "on"
              value: "on"
    offline_duration:
      name: "Offline Wartezeit (Minuten)"
      default: 5
      selector:
        number:
          min: 0
          max: 60
    online_duration:
      name: "Online Wartezeit (Minuten)"
      default: 2
      selector:
        number:
          min: 0
          max: 60
    memory_helper:
      name: "Gedächtnis Helfer (input_select)"
      selector:
        entity:
          domain: input_select
    counter_helper_total:
      name: "Zähler: Überwacht Gesamt (input_number)"
      selector:
        entity:
          domain: input_number
    offline_actions:
      name: "Aktionen bei Offline"
      default: []
      selector:
        action: {}
    online_actions:
      name: "Aktionen bei Online"
      default: []
      selector:
        action: {}

mode: parallel
max: 50

action:
  # 1. BEREINIGUNG
  - variables:
      memory: !input memory_helper
      monitored: !input monitored_entities
      mem_options: "{{ state_attr(memory, 'options') or [] }}"
      clean_list: "{{ mem_options | select('in', monitored + ['Platzhalter']) | list }}"
  
  - condition: template
    value_template: "{{ mem_options | count != clean_list | count }}"
    
  - service: input_select.set_options
    target:
      entity_id: "{{ memory }}"
    data:
      options: "{{ clean_list }}"

  # 2. HAUPTLOGIK
  - variables:
      counter_total: !input counter_helper_total
      off_states: !input offline_states
      threshold: !input offline_duration
      trigger_ent: "{{ trigger.entity_id }}"
      device: "{{ state_attr(trigger_ent, 'friendly_name') or trigger_ent }}"
      current_options: "{{ state_attr(memory, 'options') or [] }}"
      total_count: "{{ monitored | count }}"
      
      list: >
        {% set names = namespace(items=[]) %}
        {% for ent in monitored %}
          {% if ent != trigger_ent and states(ent) in off_states %}
            {% set names.items = names.items + [state_attr(ent, 'friendly_name') or ent] %}
          {% endif %}
        {% endfor %}
        {{ names.items | join(', ') if names.items | count > 0 else 'keine' }}

  - service: input_number.set_value
    data:
      entity_id: "{{ counter_total }}"
      value: "{{ total_count }}"

  - choose:
      - conditions:
          - condition: trigger
            id: "trigger_offline"
          - "{{ trigger_ent not in current_options }}"
        sequence:
          - variables:
              new_list_offline: "{{ (current_options + [trigger_ent, 'Platzhalter']) | unique | list }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_offline }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "{{ trigger_ent }}"
          - sequence: !input offline_actions

      - conditions:
          - condition: trigger
            id: "trigger_online"
          - "{{ trigger_ent in current_options }}"
        sequence:
          - variables:
              new_list_online: "{{ (current_options | reject('eq', trigger_ent) | list + ['Platzhalter']) | unique | list }}"
          - service: input_select.select_option
            data:
              entity_id: "{{ memory }}"
              option: "Platzhalter"
          - service: input_select.set_options
            data:
              entity_id: "{{ memory }}"
              options: "{{ new_list_online }}"
          - sequence: !input online_actions
