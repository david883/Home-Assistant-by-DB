blueprint:
  name: "Universelle Statusüberwachung DB"
  description: "Überwacht Entitäten auf Statusänderungen mit automatischer Bereinigung."
  domain: automation
  input:
    monitored_entities:
      name: "Zu überwachende Entitäten"
      description: "Wähle hier alle Geräte aus, die du überwachen möchtest."
      selector:
        entity:
          multiple: true
    offline_states:
      name: "Offline Status-Wörter"
      description: "Zustände, die als 'Offline' gewertet werden."
      default: ["unavailable", "unknown", "not_home", "offline", "off"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: "unavailable"
              value: "unavailable"
            - label: "unknown"
              value: "unknown"
            - label: "offline"
              value: "offline"
            - label: "off"
              value: "off"
            - label: "not_home"
              value: "not_home"
    online_states:
      name: "Online Status-Wörter"
      description: "Zustände, die als 'Online' gewertet werden."
      default: ["available", "home", "online", "on"]
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - label: "available"
              value: "available"
            - label: "online"
              value: "online"
            - label: "home"
              value: "home"
            - label: "on"
              value: "on"
    offline_duration:
      name: "Offline Wartezeit (Minuten)"
      description: "Zeit, bis die Offline-Meldung erfolgt."
      default: 5
      selector:
        number:
          min: 0
          max: 60
    online_duration:
      name: "Online Wartezeit (Minuten)"
      description: "Zeit, bis die Online-Meldung erfolgt."
      default: 2
      selector:
        number:
          min: 0
          max: 60
    memory_helper:
      name: "Gedächtnis Helfer (input_select)"
      description: "Wähle dein Dropdown für das Gedächtnis."
      selector:
        entity:
          domain: input_select
    counter_helper_total:
      name: "Zähler: Überwacht Gesamt (input_number)"
      description: "Wähle den Nummern-Helfer, der die Gesamtzahl speichern soll."
      selector:
        entity:
          domain: input_number
    offline_actions:
      name: "Aktionen bei Offline"
      description: "Was soll passieren, wenn ein Gerät offline geht?"
      selector:
        action:
    online_actions:
      name: "Aktionen bei Online"
      description: "Was soll passieren, wenn ein Gerät wieder online geht?"
      selector:
        action:

trigger:
  - platform: state
    entity_id: !input monitored_entities
    for:
      minutes: !input offline_duration
    id: "trigger_offline"
  - platform: state
    entity_id: !input monitored_entities
    for:
      minutes: !input online_duration
    id: "trigger_online"

mode: parallel
max: 50

action:
  - variables:
      memory: !input memory_helper
      monitored: !input monitored_entities
      mem_options: "{{ state_attr(memory, 'options') or [] }}"
      clean_list: "{{ mem_options | select('in', monitored + ['Platzhalter']) | list }}"
  
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ mem_options | count != clean_list | count }}"
        sequence:
          - service: input_select.set_options
            target:
              entity_id: "{{ memory }}"
            data:
              options: "{{ clean_list }}"

  - variables:
      counter_total: !input counter_helper_total
      off_states: !input offline_states
      on_states: !input online_states
      trigger_ent: "{{ trigger.entity_id }}"
      current_options: "{{ state_attr(memory, 'options') or [] }}"
      total_count: "{{ monitored | count }}"
      new_state: "{{ trigger.to_state.state }}"

  - service: input_number.set_value
    target:
      entity_id: "{{ counter_total }}"
    data:
      value: "{{ total_count }}"

  - choose:
      - conditions:
          - condition: trigger
            id: "trigger_offline"
          - "{{ new_state in off_states }}"
          - "{{ trigger_ent not in current_options }}"
        sequence:
          - variables:
              new_list_offline: "{{ (current_options + [trigger_ent, 'Platzhalter']) | unique | list }}"
          - service: input_select.set_options
            target:
              entity_id: "{{ memory }}"
            data:
              options: "{{ new_list_offline }}"
          - service: input_select.select_option
            target:
              entity_id: "{{ memory }}"
            data:
              option: "{{ trigger_ent }}"
          - sequence: !input offline_actions

      - conditions:
          - condition: trigger
            id: "trigger_online"
          - "{{ new_state in on_states }}"
          - "{{ trigger_ent in current_options }}"
        sequence:
          - variables:
              new_list_online: "{{ (current_options | reject('eq', trigger_ent) | list + ['Platzhalter']) | unique | list }}"
          - service: input_select.set_options
            target:
              entity_id: "{{ memory }}"
            data:
              options: "{{ new_list_online }}"
          - sequence: !input online_actions
