  Überwacht Entitäten auf Statusänderungen (offline/online).
  Nutzt ein input_select als Speicher für aktuell offline Geräte.

  Platzhalter für Actions:
  - {{ device }} → aktuelles Gerät
  - {{ list }} → weitere offline Geräte
  - {{ count }} → Anzahl offline Geräte