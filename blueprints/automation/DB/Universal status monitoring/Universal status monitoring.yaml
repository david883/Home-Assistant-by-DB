  name: "Universelle Statusüberwachung DB"
  description: >
    ### Version 04.04.2026-1
    **Autor: D.B.**

    <table width="100%" bgcolor="#2d2d2d" style="border-collapse: collapse;">
      <tr>
        <td align="left" style="padding: 15px; border-bottom: 1px solid #444;">
