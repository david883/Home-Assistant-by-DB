blueprint:
  name: "Zigbee Statusüberwachung DB"
  description: >
    #### Version 10.04.2026-09 Autor: D.B.

    #### [![Import Blueprint to HA](https://img.shields.io/badge/Import%20Blueprint-to%20HA-blue?style=for-the-badge&logo=homeassistant)](https://my.home-assistant.io/redirect/blueprint_import/?blueprint_url=https%3A%2F%2Fgithub.com%2Fdavid883%2FHome-Assistant-by-DB%2Fblob%2Fmain%2Fblueprints%2Fautomation%2FDB%2FZigbee%2520Status%2520Monitoring%2FZigbee%2520Status%2520Monitoring%2520DB.yaml)

    ---

    #### Dir gefällt meine Arbeit? / Do you like my work? 
    [![PayPal Spende](https://www.paypalobjects.com/de_DE/i/btn/btn_donateCC_LG.gif)](https://www.paypal.com/donate/?hosted_button_id=Y5WGESDT8LWRN)

    ---


    🇩🇪 Dieser Blueprint ermöglicht eine intelligente Überwachung von Zigbee2Mqtt Entitäten auf ihre Erreichbarkeit. ( Bitte beachten das last_seen überwacht wird. Muss in Zigbee2mqtt eingeschaltet werden) Im Gegensatz zu einfachen Automatisierungen nutzt dieses Script ein erweitertes Gedächtnis (Input Select), um den Status mehrerer Geräte gleichzeitig zu verwalten und dynamische Listen der aktuell nicht erreichbaren Geräte zu erstellen.
    

    🇬🇧 This blueprint allows intelligent monitoring of Zigbee2Mqtt entities for availability. (Please note that last_seen is monitored. Must be enabled in Zigbee2mqtt). Unlike simple automations, this script uses an extended memory (Input Select) to manage the status of multiple devices simultaneously and create dynamic lists of currently unreachable devices.


    ---


    **Kernfunktionen / Key Features:**


    🇩🇪 **Intelligentes Gedächtnis:** Nutzt einen input_select Helfer, um den Überblick über alle Offline-Geräte zu behalten.
    

    🇬🇧 Intelligent Memory: Uses an input_select helper to track all offline devices.


    ---


    🇩🇪 **Dynamische Listen:** In den Benachrichtigungen wird automatisch aufgelistet, welche anderen Geräte ebenfalls gerade offline sind.
    

    🇬🇧 Dynamic Lists: Automatically lists other offline devices in notifications.


    ---


    🇩🇪 **Verzögerungsfilter:** Einstellbare Wartezeiten für Online- und Offline-Events, um Fehlalarme bei kurzen Verbindungsabbrüchen zu vermeiden.
    

    🇬🇧 Delay Filter: Adjustable wait times to avoid false alarms during short connection drops.


    ---


    **Variablen für Aktionen / Variables for actions:**


    `{{ device }}`
    🇩🇪 Name des betroffenen Geräts
    🇬🇧 Affected device

    `{{ list }}`
    🇩🇪 Andere Offline-Geräte (max. 3 Namen)
    🇬🇧 Other offline devices (max 3 names)

    `{{ count }}`
    🇩🇪 Gesamtzahl der überwachten Geräte
    🇬🇧 Total number of monitored devices

    `{{ threshold }}`
    🇩🇪 Offline Schwellenwert in Minuten
    🇬🇧 Offline threshold in minutes

    `{{ minutes_since }}`
    🇩🇪 Minuten seit der letzten Meldung
    🇬🇧 Minutes since last seen report


    ---

  source_url: https://raw.githubusercontent.com/david883/Home-Assistant-by-DB/main/blueprints/automation/DB/Zigbee%20Status%20Monitoring/Zigbee%20Status%20Monitoring%20DB.yaml
  domain: automation
  input:
    monitored_entities:
      name: >

        🇩🇪 Zu überwachende Entitäten / 🇬🇧 Monitored entities
      description: >

        🇩🇪 Wähle die last_seen Sensoren der Geräte aus die überwacht werden sollen.

        🇬🇧 Select the last_seen sensors of the devices that should be monitored.
      selector:
        entity:
          multiple: true
          filter:
            - domain: sensor
    counter_helper:
      name: >

        🇩🇪 Zähler Helfer / 🇬🇧 Counter helper
      description: >

        🇩🇪 Input_number Helfer der genutzt wird für die Gesamtzahl der überwachten Zigbee Geräte.

        🇬🇧 Input_number helper used for the total number of monitored Zigbee devices.
      selector:
        entity:
          domain: input_number
    offline_threshold:
      name: >

        🇩🇪 Offline Schwellenwert / 🇬🇧 Offline threshold
      description: >

        🇩🇪 Anzahl der Minuten bis Geräte als Offline gelten.

        🇬🇧 Number of minutes until devices are considered offline.
      default: 60
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min
    online_confirmation:
      name: >

        🇩🇪 Online Bestätigungszeit / 🇬🇧 Online confirmation
      description: >

        🇩🇪 Anzahl an Minuten bis Geräte wieder als Online gelten.

        🇬🇧 Number of minutes until devices are considered online again.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min
    memory_helper:
      name: >

        🇩🇪 Gedächtnis Helfer / 🇬🇧 Memory helper
      description: >

        🇩🇪 Input_select Helfer (Dropdown Helfer) in dem die Geräte als offline gespeichert wurden.

        🇬🇧 Input_select helper (dropdown helper) where the devices are stored as offline.
      selector:
        entity:
          domain: input_select
    offline_actions:
      name: >

        🇩🇪 Aktionen bei Offline / 🇬🇧 Offline actions
      description: >

        🇩🇪 Aktionen, wenn ein Gerät offline geht. Hier kann z.b. ein Text über Push versendet werden. Die oben erwähnten Variablen sind hier nutzbar!

        🇬🇧 Actions when a device goes offline. For example, a push notification can be sent here. The variables mentioned above can be used!
      default:
        - service: input_text.set_value
          target:
            entity_id: input_text.benachrichtigung_zum_verarbeiten
          data:
            value: "David: {{ device }} ist seit {{ threshold }} Min. offline. Andere: {{ list }}. (Gesamt: {{ count }})"
      selector:
        action: {}
    online_actions:
      name: >

        🇩🇪 Aktionen bei Online / 🇬🇧 Online actions
      description: >

        🇩🇪 Aktionen, wenn ein Gerät wieder online geht. Hier kann z.b. ein Text über Push versendet werden. Die oben erwähnten Variablen sind hier nutzbar!

        🇬🇧 Actions when a device goes back online. For example, a push notification can be sent here. The variables mentioned above can be used!
      default:
        - service: input_text.set_value
          target:
            entity_id: input_text.benachrichtigung_zum_verarbeiten
          data:
            value: "David: {{ device }} ist wieder online. Noch offline: {{ list }}. (Überwacht: {{ count }})"
      selector:
        action: {}

mode: parallel

trigger:
  - trigger: time_pattern
    minutes: "/1"

action:
  - variables:
      memory: !input memory_helper
      monitored: !input monitored_entities
      threshold: !input offline_threshold
      on_confirm: !input online_confirmation
      count_entity: !input counter_helper
      count: "{{ monitored | count }}"

  - service: input_number.set_value
    target:
      entity_id: "{{ count_entity }}"
    data:
      value: "{{ count }}"

  - repeat:
      for_each: "{{ monitored }}"
      sequence:
        - variables:
            ent: "{{ repeat.item }}"
            device: "{{ state_attr(ent, 'friendly_name') | replace(' Last seen', '') | replace(' last_seen', '') | replace(' last seen', '') }}"
            state_val: "{{ states(ent) }}"
            is_valid: "{{ has_value(ent) and state_val not in ['unavailable', 'unknown', 'none'] }}"
            minutes_since: "{{ (as_timestamp(now()) - as_timestamp(state_val)) / 60 if is_valid else 0 }}"
            is_offline_now: "{{ is_valid and minutes_since | float > threshold | float }}"
            is_confirmed_online: "{{ is_valid and minutes_since | float < on_confirm | float }}"
            is_in_memory: "{{ ent in (state_attr(memory, 'options') or []) }}"

            list: >
              {% set mem_list = state_attr(memory, 'options') | reject('eq', 'Platzhalter') | reject('eq', ent) | list %}
              {% set total_off = mem_list | count %}
              {% if total_off > 0 %}
                {% set names = namespace(items=[]) %}
                {% for item in mem_list[:3] %}
                  {% set names.items = names.items + [state_attr(item, 'friendly_name') | replace(' Last seen', '') | replace(' last_seen', '') | replace(' last seen', '')] %}
                {% endfor %}
                {{ names.items | join(', ') }}{% if total_off > 3 %} ... (+{{ total_off - 3 }} weitere){% endif %}
              {% else %}
                keine
              {% endif %}

        - choose:
            # GEHT OFFLINE
            - conditions:
                - "{{ is_offline_now }}"
                - "{{ not is_in_memory }}"
              sequence:
                - variables:
                    new_opts_off: "{{ (state_attr(memory, 'options') + [ent]) | unique | reject('eq', 'Platzhalter') | list }}"
                - service: input_select.set_options
                  data:
                    entity_id: "{{ memory }}"
                    options: "{{ new_opts_off }}"
                # Wir selektieren sofort das neue Offline-Gerät, damit der "Platzhalter" nicht mehr aktiv ist
                - service: input_select.select_option
                  data:
                    entity_id: "{{ memory }}"
                    option: "{{ ent }}"
                - sequence: !input offline_actions

            # GEHT ONLINE
            - conditions:
                - "{{ is_confirmed_online }}"
                - "{{ is_in_memory }}"
              sequence:
                - variables:
                    new_opts_on: >
                      {% set remaining = state_attr(memory, 'options') | reject('eq', ent) | list %}
                      {{ (remaining + ['Platzhalter']) | unique | list }}
                - service: input_select.set_options
                  data:
                    entity_id: "{{ memory }}"
                    options: "{{ new_opts_on }}"
                - service: input_select.select_option
                  data:
                    entity_id: "{{ memory }}"
                    option: "Platzhalter"
                - sequence: !input online_actions
