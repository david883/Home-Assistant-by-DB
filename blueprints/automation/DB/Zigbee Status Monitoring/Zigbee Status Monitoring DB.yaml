blueprint:
  name: "Zigbee Statusüberwachung DB"
  description: >
    #### Version 09.04.2026-05 Autor: D.B.
    ... (Rest wie gehabt) ...

  # (Inputs bleiben identisch wie in Version 09.04.2026-02)
  source_url: https://raw.githubusercontent.com/david883/Home-Assistant-by-DB/main/blueprints/automation/DB/Zigbee%20Status%20Monitoring/Zigbee%20Status%20Monitoring%20DB.yaml
  domain: automation
  input:
    monitored_entities:
      name: "Zu überwachende last_seen Entitäten"
      selector:
        entity:
          multiple: true
          filter:
            - domain: sensor
    counter_helper:
      name: "Zähler Helfer (input_number)"
      selector:
        entity:
          domain: input_number
    offline_threshold:
      name: "Offline Schwellenwert (Minuten)"
      default: 60
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min
    online_confirmation:
      name: "Online Bestätigungszeit (Minuten)"
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min
    memory_helper:
      name: "Gedächtnis Helfer / Memory Helper"
      selector:
        entity:
          domain: input_select
    offline_actions:
      name: "Aktionen bei Offline"
      default: []
      selector:
        action: {}
    online_actions:
      name: "Aktionen bei Online"
      default: []
      selector:
        action: {}

mode: parallel

trigger:
  - trigger: time_pattern
    minutes: "/1"

action:
  - variables:
      memory: !input memory_helper
      monitored: !input monitored_entities
      threshold: !input offline_threshold
      on_confirm: !input online_confirmation
      count_entity: !input counter_helper
      count: "{{ monitored | count }}"

  - service: input_number.set_value
    target:
      entity_id: "{{ count_entity }}"
    data:
      value: "{{ count }}"

  - repeat:
      for_each: "{{ monitored }}"
      sequence:
        - variables:
            ent: "{{ repeat.item }}"
            device: "{{ state_attr(ent, 'friendly_name') | replace(' Last seen', '') | replace(' last_seen', '') }}"
            state_val: "{{ states(ent) }}"
            is_valid: "{{ has_value(ent) and state_val not in ['unavailable', 'unknown', 'none'] }}"
            minutes_since: "{{ (as_timestamp(now()) - as_timestamp(state_val)) / 60 if is_valid else 0 }}"
            
            is_offline_now: "{{ is_valid and minutes_since | float > threshold | float }}"
            is_confirmed_online: "{{ is_valid and minutes_since | float < on_confirm | float }}"
            is_in_memory: "{{ ent in (state_attr(memory, 'options') or []) }}"

            # GEKÜRZTE LISTE (max 3 Namen, dann Anzahl), um 255 Zeichen Limit zu wahren
            list: >
              {% set mem_list = state_attr(memory, 'options') | reject('eq', 'Platzhalter') | reject('eq', ent) | list %}
              {% set total_off = mem_list | count %}
              {% if total_off > 0 %}
                {% set names = namespace(items=[]) %}
                {% for item in mem_list[:3] %}
                  {% set names.items = names.items + [state_attr(item, 'friendly_name') | replace(' Last seen', '') | replace(' last_seen', '')] %}
                {% endfor %}
                {{ names.items | join(', ') }}{% if total_off > 3 %} ... (+{{ total_off - 3 }} weitere){% endif %}
              {% else %}
                keine
              {% endif %}

        - choose:
            - conditions:
                - "{{ is_offline_now }}"
                - "{{ not is_in_memory }}"
              sequence:
                - service: input_select.set_options
                  data:
                    entity_id: "{{ memory }}"
                    options: "{{ (state_attr(memory, 'options') + [ent]) | unique | reject('eq', 'Platzhalter') | list }}"
                - sequence: !input offline_actions

            - conditions:
                - "{{ is_confirmed_online }}"
                - "{{ is_in_memory }}"
              sequence:
                - service: input_select.set_options
                  data:
                    entity_id: "{{ memory }}"
                    options: >
                      {% set opts = state_attr(memory, 'options') | reject('eq', ent) | reject('eq', 'Platzhalter') | list %}
                      {{ opts if opts | count > 0 else ['Platzhalter'] }}
                - sequence: !input online_actions
